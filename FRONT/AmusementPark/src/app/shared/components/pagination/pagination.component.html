<div class="app-pagination" *ngIf="shouldRender">
  <app-ui-paginator
    [first]="resolvedFirst"
    [rows]="resolvedRows"
    [totalRecords]="resolvedTotalRecords"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [pageLinkSize]="pageLinkSize"
    (onPageChange)="onPageChange($event)">
  </app-ui-paginator>
</div>
