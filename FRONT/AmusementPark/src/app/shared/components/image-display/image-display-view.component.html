<img
  *ngIf="showImage"
  [src]="resolvedImageUrl"
  [attr.srcset]="resolvedImageSrcSet"
  [attr.sizes]="resolvedImageSizes"
  [alt]="resolvedAlt"
  [ngClass]="imgClass"
  [attr.loading]="loading"
  [attr.fetchpriority]="fetchPriority"
  decoding="async"
  (error)="onImageError()" />

<div
  *ngIf="!showImage"
  class="image-display__placeholder"
  [ngClass]="placeholderClass">
  <i [ngClass]="placeholderIconClass"></i>
</div>
