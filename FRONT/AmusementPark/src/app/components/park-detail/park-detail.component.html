<div class="park-detail page-shell" *ngIf="park; else loading">
  <div class="page-header">
    <div>
      <span class="app-chip">
        <i class="pi pi-compass"></i>
        {{ park.countryCode }}
      </span>
      <h1 class="page-title">{{ park.name }}</h1>
      <p class="page-subtitle">
        Detailed information about this park and its geographic location.
      </p>
    </div>

    <button pButton type="button" label="Retour" icon="pi pi-arrow-left" (click)="goBack()"></button>
  </div>

  <div class="detail-grid">
    <div class="detail-card">
      <span class="detail-label">Country Code</span>
      <strong>{{ park.countryCode }}</strong>
    </div>

    <div class="detail-card">
      <span class="detail-label">Latitude</span>
      <strong>{{ park.latitude }}</strong>
    </div>

    <div class="detail-card">
      <span class="detail-label">Longitude</span>
      <strong>{{ park.longitude }}</strong>
    </div>
  </div>

  <div class="detail-card detail-card--description mt-4" *ngIf="localizedDescription">
    <span class="detail-label">{{ 'parkDetail.descriptionTitle' | translate }}</span>
    <div class="park-description" [innerHTML]="localizedDescription"></div>
  </div>
</div>

<ng-template #loading>
  <div class="app-empty-state">
    <i class="pi pi-spin pi-spinner"></i>
    <h3>Chargement du parc...</h3>
  </div>
</ng-template>
