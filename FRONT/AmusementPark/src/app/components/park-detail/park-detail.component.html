<app-park-detail-view
  [state]="state"
  [park]="park"
  [explorer]="explorer"
  [nearbyParks]="nearbyParks"
  [nearbyState]="nearbyState"
  [currentLang]="currentLang"
  [hasPracticalInfoFn]="hasPracticalInfo.bind(this)"
  [hasLocationInfoFn]="hasLocationInfo.bind(this)"

</app-park-detail-view>
