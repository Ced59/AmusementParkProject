<app-page-state
  [state]="pageState"
  loadingTitleKey="parks.detail.loadingTitle"
  loadingMessageKey="parks.detail.loadingMessage"
  errorTitleKey="parks.detail.errorTitle"
  errorMessageKey="parks.detail.errorMessage">
  <div class="park-detail" *ngIf="park as currentPark">
    <div class="page-header">
      <div>
        <span class="app-chip">
          <i class="pi pi-compass"></i>
          {{ 'parks.detail.heroBadge' | translate }}
        </span>
      </div>

      <div class="detail-actions">
        <button
          pButton
          type="button"
          icon="pi pi-arrow-left"
          [label]="'parks.actions.backToList' | translate"
          (click)="goBack()"></button>

        <button
          pButton
          type="button"
          icon="pi pi-sitemap"
          class="p-button-outlined"
          [label]="'parkVisitor.summary.viewAllItems' | translate"
          (click)="goToExplore()"></button>
      </div>
    </div>

    <app-park-hero-section [park]="currentPark" [currentLang]="currentLang"></app-park-hero-section>

    <app-park-content-summary
      *ngIf="explorer"
      [park]="currentPark"
      [explorer]="explorer"
      [currentLang]="currentLang">
    </app-park-content-summary>

    <div class="park-detail__grid">
      <app-park-practical-info-section
        *ngIf="hasPracticalInfo(currentPark)"
        [park]="currentPark">
      </app-park-practical-info-section>

      <app-park-location-section
        *ngIf="hasLocationInfo(currentPark)"
        [park]="currentPark">
      </app-park-location-section>
    </div>

    <app-park-nearby-section
      [parks]="nearbyParks"
      [currentLang]="currentLang"
      [state]="nearbyState">
    </app-park-nearby-section>
  </div>
</app-page-state>
