<p-card>
  <div class="page-header">
    <div>
      <h2>{{ (isEditMode ? 'admin.parks.items.editTitle' : 'admin.parks.items.createTitle') | translate }}</h2>
      <small class="text-color-secondary">
        {{ 'admin.parks.items.refactorHint' | translate }}
      </small>
    </div>

    <div class="editor-toolbar">
      <div class="editor-toolbar__status" [class.is-dirty]="isFormDirty" [class.is-saving]="isSaving">
        <i class="pi" [ngClass]="isSaving ? 'pi-spin pi-spinner' : (isFormDirty ? 'pi-pencil' : 'pi-check-circle')"></i>
        <span>{{ getEditorStatusLabel() }}</span>
      </div>

      <div class="editor-toolbar__actions">
        <button
          pButton
          type="button"
          class="p-button-secondary p-button-outlined"
          icon="pi pi-list"
          (click)="goBack()"
          [disabled]="isSaving"
          [label]="'admin.parks.items.editorActions.backToItems' | translate">
        </button>

        <button
          pButton
          type="button"
          icon="pi pi-save"
          class="p-button-secondary"
          (click)="saveAll()"
          [loading]="isSaving"
          [disabled]="isSaving"
          [label]="'admin.parks.items.editorActions.saveAll' | translate">
        </button>

        <button
          pButton
          type="button"
          icon="pi pi-check"
          (click)="saveAndClose()"
          [loading]="isSaving"
          [disabled]="isSaving"
          [label]="'admin.parks.items.editorActions.saveAndClose' | translate">
        </button>
      </div>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-fluid">
    <p-tabView [(activeIndex)]="activeTabIndex" (activeIndexChange)="onTabChange($event)">
      <p-tabPanel [header]="'admin.parks.items.tabs.general' | translate">
        <app-admin-park-item-general-tab
          *ngIf="activeTabIndex === 0"
          [form]="form"
          [categoryOptions]="categoryOptions"
          [filteredTypeOptions]="filteredTypeOptions"
          [zones]="zones"
          [generalMapCenter]="generalMapCenter"
          [generalMapZoom]="generalMapZoom"
          [generalMapMarkers]="generalMapMarkers"
          [canUseParkLocation]="!!parkLocationDefault"
          [isSaving]="isSaving"
          (generalMapPositionChange)="onGeneralMapPositionChange($event)"
          (resetGeneralLocationToPark)="resetGeneralLocationToPark()"
          (saveSection)="saveSection()">
        </app-admin-park-item-general-tab>
      </p-tabPanel>

      <p-tabPanel *ngIf="isAttractionCategory" [header]="'admin.parks.items.tabs.details' | translate">
        <app-admin-park-item-details-tab
          *ngIf="activeTabIndex === 1"
          [formGroup]="attractionDetailsGroup"
          [manufacturerOptions]="manufacturerOptions"
          [manufacturersLoading]="manufacturersLoading"
          [manufacturerAddLink]="['/', currentLang, 'admin', 'manufacturers', 'new']"
          [manufacturerAddQueryParams]="manufacturerCreateLinkQueryParams"
          [waterExposureLevelOptions]="waterExposureLevelOptions"
          [isSaving]="isSaving"
          (saveSection)="saveSection()">
        </app-admin-park-item-details-tab>
      </p-tabPanel>

      <p-tabPanel *ngIf="isAttractionCategory" [header]="'admin.parks.items.tabs.accessConditions' | translate">
        <app-admin-park-item-access-conditions-tab
          *ngIf="activeTabIndex === 2"
          [formGroup]="attractionDetailsGroup"
          [accessConditionPresetOptions]="accessConditionPresetOptions"
          [accessConditionUnitOptions]="accessConditionUnitOptions"
          [selectedAccessConditionPreset]="selectedAccessConditionPreset"
          [currentLang]="currentLang"
          [isSaving]="isSaving"
          (selectedAccessConditionPresetChange)="selectedAccessConditionPreset = $event"
          (addAccessCondition)="addAccessCondition($event)"
          (removeAccessCondition)="removeAccessCondition($event)"
          (moveAccessConditionUp)="moveAccessConditionUp($event)"
          (moveAccessConditionDown)="moveAccessConditionDown($event)"
          (accessConditionTypeChanged)="onAccessConditionTypeChanged($event)"
          (saveSection)="saveSection()">
        </app-admin-park-item-access-conditions-tab>
      </p-tabPanel>

      <p-tabPanel *ngIf="isAttractionCategory" [header]="'admin.parks.items.tabs.locations' | translate">
        <app-admin-park-item-locations-tab
          *ngIf="activeTabIndex === 3"
          [formGroup]="attractionLocationsGroup"
          [selectedLocationKey]="selectedLocationKey"
          [attractionLocationOptions]="attractionLocationOptions"
          [locationMapCenter]="locationMapCenter"
          [locationMapZoom]="locationMapZoom"
          [locationMapMarkers]="locationMapMarkers"
          [isSaving]="isSaving"
          (selectedLocationKeyChange)="selectLocationEditor($event)"
          (specificLocationMapPositionChange)="onSpecificLocationMapPositionChange($event)"
          (clearLocationPoint)="clearLocationPoint($event)"
          (useGeneralLocation)="useGeneralLocationForSelectedPoint()"
          (clearSelectedLocation)="clearSelectedLocationPoint()"
          (saveSection)="saveSection()">
        </app-admin-park-item-locations-tab>
      </p-tabPanel>

      <p-tabPanel *ngIf="isAttractionCategory" [header]="'admin.parks.items.tabs.photos' | translate">
        <app-admin-park-item-photos-tab
          *ngIf="activeTabIndex === 4"
          [isEditMode]="isEditMode"
          [currentPhoto]="currentPhoto"
          [allowMultiplePhotoUpload]="allowMultiplePhotoUpload"
          [selectedPhotoCount]="selectedPhotoCount"
          [newPhotoDescription]="newPhotoDescription"
          [photosUploading]="photosUploading"
          [photosLoading]="photosLoading"
          [attractionPhotos]="attractionPhotos"
          [pagedPhotos]="pagedPhotos"
          [photosPageSize]="photosPageSize"
          [isSaving]="isSaving"
          (photoFileSelected)="onPhotoFileSelected($event)"
          (newPhotoDescriptionChange)="newPhotoDescription = $event"
          (uploadPhoto)="onUploadPhoto()"
          (setCurrentPhoto)="onSetCurrentPhoto($event)"
          (deletePhoto)="onDeletePhoto($event)"
          (photosPageChange)="onPhotosPageChange($event)"
          (saveSection)="saveSection()">
        </app-admin-park-item-photos-tab>
      </p-tabPanel>
    </p-tabView>
  </form>
</p-card>
