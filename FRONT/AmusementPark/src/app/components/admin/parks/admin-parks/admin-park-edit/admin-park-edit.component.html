<div class="admin-park-edit p-3">
  <div class="page-header">
    <div>
      <h2 *ngIf="!isEditMode">
        {{ 'admin.parks.editPage.createTitle' | translate }}
      </h2>
      <h2 *ngIf="isEditMode">
        {{ 'admin.parks.editPage.updateTitle' | translate:{ name: nameControl?.value || '—' } }}
      </h2>
      <small class="text-color-secondary">
        {{ 'admin.parks.refactorHint' | translate }}
      </small>
    </div>

    <div class="page-header__aside">
      <div *ngIf="form">
        <p-tag
          *ngIf="isVisibleControl?.value"
          severity="success"
          [value]="'admin.parks.visible' | translate">
        </p-tag>
        <p-tag
          *ngIf="!isVisibleControl?.value"
          severity="warning"
          [value]="'admin.parks.hidden' | translate">
        </p-tag>
      </div>

      <app-editor-save-toolbar
        [statusLabel]="getEditorStatusLabel()"
        [isDirty]="isFormDirty"
        [isSaving]="isSaving"
        [backButtonLabel]="'admin.parks.editorActions.backToParks' | translate"
        [saveAllButtonLabel]="'admin.parks.editorActions.saveAll' | translate"
        [saveAndCloseButtonLabel]="'admin.parks.editorActions.saveAndClose' | translate"
        (back)="goBack()"
        (saveAll)="saveAll()"
        (saveAndClose)="saveAndClose()">
      </app-editor-save-toolbar>
    </div>
  </div>

  <p-card>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-fluid">
      <p-tabView [(activeIndex)]="activeTabIndex" (activeIndexChange)="onTabChange($event)">
        <p-tabPanel [header]="'admin.parks.tabs.general' | translate">
          <app-admin-park-general-tab
            *ngIf="activeTabIndex === 0"
            [form]="form"
            [parkTypeOptions]="parkTypeOptions"
            [countryOptions]="countryOptions"
            [founderOptions]="founderOptions"
            [operatorOptions]="operatorOptions"
            [foundersLoading]="foundersLoading"
            [operatorsLoading]="operatorsLoading"
            [founderAddLink]="['/', currentLang, 'admin', 'parks', 'founders', 'new']"
            [founderAddQueryParams]="founderCreateLinkQueryParams"
            [operatorAddLink]="['/', currentLang, 'admin', 'operators', 'new']"
            [operatorAddQueryParams]="operatorCreateLinkQueryParams"
            [currentLang]="currentLang"
            [parkId]="parkId"
            [isEditMode]="isEditMode"
            [isSaving]="isSaving"
            (saveSection)="saveSection()">
          </app-admin-park-general-tab>
        </p-tabPanel>

        <p-tabPanel [header]="'admin.parks.tabs.location' | translate">
          <app-admin-park-location-tab
            *ngIf="activeTabIndex === 1"
            [form]="form"
            [mapCenter]="mapCenter"
            [mapZoom]="mapZoom"
            [mapMarkers]="mapMarkers"
            [isSaving]="isSaving"
            (mapPositionChange)="onMapPositionChange($event)"
            (saveSection)="saveSection()">
          </app-admin-park-location-tab>
        </p-tabPanel>

        <p-tabPanel [header]="'admin.parks.tabs.descriptions' | translate">
          <app-admin-park-descriptions-tab
            *ngIf="activeTabIndex === 2"
            [form]="form"
            [isSaving]="isSaving"
            (saveSection)="saveSection()">
          </app-admin-park-descriptions-tab>
        </p-tabPanel>

        <p-tabPanel [header]="'admin.parks.tabs.logos' | translate">
          <app-admin-park-logos-tab
            *ngIf="activeTabIndex === 3"
            [isEditMode]="isEditMode"
            [currentLogo]="currentLogo"
            [allowMultipleLogoUpload]="allowMultipleLogoUpload"
            [selectedLogoCount]="selectedLogoCount"
            [newLogoDescription]="newLogoDescription"
            [logosUploading]="logosUploading"
            [logosLoading]="logosLoading"
            [parkLogos]="parkLogos"
            [pagedLogos]="pagedLogos"
            [logosPageSize]="logosPageSize"
            [isSaving]="isSaving"
            (logoFileSelected)="onLogoFileSelected($event)"
            (newLogoDescriptionChange)="newLogoDescription = $event"
            (uploadLogo)="onUploadLogo()"
            (setCurrentLogo)="onSetCurrentLogo($event)"
            (deleteLogo)="onDeleteLogo($event)"
            (logosPageChange)="onLogosPageChange($event)"
            (saveSection)="saveSection()">
          </app-admin-park-logos-tab>
        </p-tabPanel>
      </p-tabView>
    </form>
  </p-card>
</div>
