<div class="admin-data-page">
  <ng-container *ngIf="selectedSourceKey() === null">
    <div class="page-header">
      <h2 class="page-title"><i class="pi pi-database"></i> Gestion des données externes</h2>
      <p class="page-subtitle">Pilotez les sources de données qui alimentent l'application.</p>
    </div>

    <app-admin-data-sources-list
      [sources]="dataSources()"
      (manageSource)="selectSource($event)">
    </app-admin-data-sources-list>
  </ng-container>

  <app-captain-coaster-admin-provider
    *ngIf="selectedSourceKey() === 'captain-coaster'"
    (back)="backToSources()">
  </app-captain-coaster-admin-provider>
</div>
