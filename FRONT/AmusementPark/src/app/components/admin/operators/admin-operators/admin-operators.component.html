<p-card styleClass="admin-list-card">
  <ng-template pTemplate="header">
    <div class="admin-list-header">
      <div>
        <span class="admin-kicker">M14 · Admin</span>
        <h2>{{ 'admin.operators.title' | translate }}</h2>
        <p>{{ 'admin.operators.subtitle' | translate }}</p>
      </div>

      <span class="admin-total-pill">
        {{ 'admin.operators.total' | translate:{ count: totalCount() } }}
      </span>
    </div>
  </ng-template>

  <div class="admin-toolbar">
    <div class="admin-toolbar__search">
      <label class="admin-field-label" for="admin-operators-search">{{ 'admin.filters.search' | translate }}</label>
      <div class="admin-search-field">
        <span class="pi pi-search" aria-hidden="true"></span>
        <input
          id="admin-operators-search"
          pInputText
          type="text"
          [ngModel]="stateFacade.searchQuery()"
          (ngModelChange)="onSearchQueryChanged($event)"
          [placeholder]="'admin.operators.searchPlaceholder' | translate" />
      </div>
    </div>

    <div class="admin-toolbar__actions">
      <a
        pButton
        type="button"
        icon="pi pi-plus"
        class="p-button-sm"
        [routerLink]="['/', currentLang, 'admin', 'operators', 'new']"
        [label]="'admin.operators.create' | translate">
      </a>
    </div>
  </div>

  <p-table
    [value]="operators()"
    [loading]="loading()"
    [responsiveLayout]="'scroll'"
    styleClass="admin-data-table">
    <ng-template pTemplate="header">
      <tr>
        <th>{{ 'admin.operators.name' | translate }}</th>
        <th>{{ 'admin.operators.actions' | translate }}</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-parkOperator>
      <tr>
        <td><strong class="admin-row-title">{{ parkOperator.name }}</strong></td>
        <td>
          <a
            pButton
            type="button"
            icon="pi pi-pencil"
            class="p-button-sm"
            [routerLink]="['/', currentLang, 'admin', 'operators', 'edit', parkOperator.id]"
            [label]="'actions.edit' | translate">
          </a>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2">
          <app-empty-state
            [compact]="true"
            titleKey="common.emptyTitle"
            messageKey="admin.operators.empty">
          </app-empty-state>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <app-pagination
    [rows]="pageSize()"
    [first]="(currentPage() - 1) * pageSize()"
    [totalRecords]="totalCount()"
    [rowsPerPageOptions]="[10, 20, 50, 100]"
    (pageChanged)="onPageChanged($event)">
  </app-pagination>
</p-card>
