<div class="p-3">
  <p-card>
    <h2>
      {{
        (isEditMode
          ? 'admin.parkFounders.editPage.updateTitle'
          : 'admin.parkFounders.editPage.createTitle') | translate
      }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-fluid">
      <div class="field">
        <label for="name">{{ 'admin.parkFounders.editPage.name' | translate }}</label>
        <input id="name" pInputText type="text" formControlName="name" />
      </div>

      <div class="field mt-3">
        <label>{{ 'admin.parkFounders.editPage.biography' | translate }}</label>
        <app-localized-rich-text-editor formControlName="biography"></app-localized-rich-text-editor>
      </div>

      <div class="flex justify-content-end gap-2 mt-3">
        <button
          pButton
          type="button"
          class="p-button-secondary"
          (click)="onCancel()"
          [label]="'actions.cancel' | translate">
        </button>

        <button
          pButton
          type="submit"
          class="p-button-primary"
          [label]="'actions.save' | translate">
        </button>
      </div>
    </form>
  </p-card>
</div>
