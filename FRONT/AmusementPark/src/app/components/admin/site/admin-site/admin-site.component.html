<div class="admin-images-page">
  <h2>Image library</h2>
  @if (loading) {
    <p>Loading...</p>
  }
  <div class="admin-images-layout">
    <div class="images-list">
      @for (image of images; track trackById($index, image)) {
        <button type="button" class="image-list-item" (click)="selectImage(image)">
          <img [src]="apiService.buildImageUrl(image.id)" [alt]="image.description || image.originalFileName || image.id">
          <div>
            <strong>{{ image.originalFileName || image.id }}</strong>
            <div>{{ image.width }} × {{ image.height }}</div>
            <div>{{ image.contentType }}</div>
          </div>
        </button>
      }
    </div>
    <div class="image-editor">
      @if (selectedImage) {
        <h3>{{ selectedImage.originalFileName || selectedImage.id }}</h3>
        <img class="selected-preview" [src]="apiService.buildImageUrl(selectedImage.id)" [alt]="selectedImage.description || selectedImage.id">
        <label>Description</label>
        <input [(ngModel)]="selectedImage.description">
        <label>Published</label>
        <input type="checkbox" [(ngModel)]="selectedImage.isPublished">
        <label>Latitude</label>
        <input type="number" [(ngModel)]="selectedImage.geoLocation.latitude">
        <label>Longitude</label>
        <input type="number" [(ngModel)]="selectedImage.geoLocation.longitude">
        <h4>Tags</h4>
        <div class="tags-grid">
          @for (tag of tags; track trackById($index, tag)) {
            <label><input type="checkbox" [checked]="selectedImage.tagIds?.includes(tag.id)" (change)="toggleTag(tag.id, $any($event.target).checked)"> {{ tag.slug }}</label>
          }
        </div>
        <button type="button" (click)="saveImage()">Save image</button>
      }
      <div class="tag-create">
        <h3>Create tag</h3>
        <input [(ngModel)]="newTagSlug" placeholder="tag slug">
        <button type="button" (click)="createTag()">Create tag</button>
      </div>
    </div>
  </div>
</div>
