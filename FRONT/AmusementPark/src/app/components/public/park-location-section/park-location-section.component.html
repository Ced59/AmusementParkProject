<section class="park-location" *ngIf="park as currentPark">
  <div class="public-section-header park-section-header">
    <div>
      <span class="public-kicker">
        <i class="pi pi-map"></i>
        {{ 'parks.detail.location.title' | translate }}
      </span>
      <h2 class="public-section-header__title">{{ 'parks.detail.location.title' | translate }}</h2>
      <p class="public-section-header__subtitle">{{ 'parks.detail.location.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="park-location__stats">
    <article class="park-location__stat">
      <span>{{ 'parks.fields.latitude' | translate }}</span>
      <strong>{{ currentPark.latitude }}</strong>
    </article>

    <article class="park-location__stat">
      <span>{{ 'parks.fields.longitude' | translate }}</span>
      <strong>{{ currentPark.longitude }}</strong>
    </article>
  </div>

  <app-leaflet-map
    *ngIf="hasCoordinates"
    [center]="center"
    [zoom]="11"
    [markers]="markers">
  </app-leaflet-map>
</section>
