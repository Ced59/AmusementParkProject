<article class="park-card" [class.park-card--compact]="compact" *ngIf="park as currentPark">
  <div class="park-card__visual" [class.park-card__visual--placeholder]="!hasLogoImageId">
    <div class="park-card__visual-badges">
      <span class="public-pill public-pill--soft" *ngIf="currentPark.countryCode">
        <i class="pi pi-map-marker"></i>
        {{ currentPark.countryCode }}
      </span>

      <span class="public-pill public-pill--cyan" *ngIf="currentPark.city && !compact">
        {{ currentPark.city }}
      </span>
    </div>

    <app-image-display
      [imageId]="currentPark.logoImageId"
      [alt]="currentPark.name || 'Park logo'"
      imgClass="park-card__logo">
    </app-image-display>
  </div>

  <div class="park-card__body">
    <div class="park-card__headline">
      <p class="park-card__eyebrow" *ngIf="currentPark.locationLine">{{ currentPark.locationLine }}</p>
      <h3 class="park-card__title">{{ currentPark.name }}</h3>
    </div>

    <p class="park-card__description" *ngIf="currentPark.shortDescription && !compact">
      {{ currentPark.shortDescription }}
    </p>

    <div class="park-card__details">
      <div class="park-card__detail" *ngIf="currentPark.addressLine">
        <span class="park-card__label">{{ 'parks.fields.address' | translate }}</span>
        <strong>{{ currentPark.addressLine }}</strong>
      </div>

      <div class="park-card__detail" *ngIf="currentPark.coordinatesLine && !compact">
        <span class="park-card__label">{{ 'parks.fields.coordinates' | translate }}</span>
        <strong>{{ currentPark.coordinatesLine }}</strong>
      </div>
    </div>
  </div>

  <div class="park-card__footer">
    <a
      *ngIf="parkLink"
      pButton
      [routerLink]="parkLink"
      class="park-card__cta"
      icon="pi pi-arrow-right"
      [label]="'parks.actions.viewDetails' | translate">
    </a>

    <a
      *ngIf="currentPark.websiteUrl"
      pButton
      class="p-button-text park-card__secondary-cta"
      icon="pi pi-external-link"
      [href]="currentPark.websiteUrl"
      target="_blank"
      rel="noreferrer noopener"
      [label]="'parks.actions.website' | translate">
    </a>
  </div>
</article>
