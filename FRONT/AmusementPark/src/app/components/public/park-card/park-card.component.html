<article class="park-card" [class.park-card--compact]="compact" *ngIf="park as currentPark">
  <div class="park-card__visual" [class.park-card__visual--placeholder]="!logoUrl">
    <img
      *ngIf="logoUrl"
      [src]="logoUrl"
      [alt]="currentPark.name || 'Park logo'"
      class="park-card__logo" />

    <div *ngIf="!logoUrl" class="park-card__fallback">
      <i class="pi pi-image"></i>
    </div>
  </div>

  <div class="park-card__body">
    <div class="park-card__chips">
      <span class="app-chip" *ngIf="currentPark.countryCode">
        <i class="pi pi-map"></i>
        {{ currentPark.countryCode }}
      </span>

      <span class="park-card__city" *ngIf="currentPark.city">
        {{ currentPark.city }}
      </span>
    </div>

    <h3 class="park-card__title">{{ currentPark.name }}</h3>

    <p class="park-card__subtitle" *ngIf="locationLine">
      {{ locationLine }}
    </p>

    <div class="park-card__details">
      <div class="park-card__detail" *ngIf="addressLine">
        <span class="park-card__label">{{ 'parks.fields.address' | translate }}</span>
        <strong>{{ addressLine }}</strong>
      </div>

      <div class="park-card__detail" *ngIf="coordinatesLine && !compact">
        <span class="park-card__label">{{ 'parks.fields.coordinates' | translate }}</span>
        <strong>{{ coordinatesLine }}</strong>
      </div>
    </div>
  </div>

  <div class="park-card__footer">
    <a
      *ngIf="parkLink"
      pButton
      [routerLink]="parkLink"
      class="p-button-rounded"
      icon="pi pi-arrow-right"
      [label]="'parks.actions.viewDetails' | translate">
    </a>

    <a
      *ngIf="currentPark.webSiteUrl"
      pButton
      class="p-button-rounded p-button-text"
      icon="pi pi-external-link"
      [href]="currentPark.webSiteUrl"
      target="_blank"
      rel="noreferrer noopener"
      [label]="'parks.actions.website' | translate">
    </a>
  </div>
</article>
