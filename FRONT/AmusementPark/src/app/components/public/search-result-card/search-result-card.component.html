@if (item; as currentItem) {
  <app-ui-result-card
    [title]="currentItem.title"
    [description]="currentItem.description"
    [kickerLabelKey]="categoryLabelKey"
    [kickerTone]="cardTone"
    [kickerIconClass]="cardIconClass"
    [iconClass]="cardIconClass"
    [routerLink]="parkLink">
  </app-ui-result-card>
}
