<section class="auth-page">
  <article class="auth-card" appUiSurface="panel" appUiSurfacePadding="spacious">
    <app-ui-section-header
      kickerTone="sky"
      kickerIconClass="pi pi-key"
      kickerLabelKey="auth.forgot_password.kicker"
      titleKey="auth.forgot_password.title"
      subtitleKey="auth.forgot_password.description">
    </app-ui-section-header>

    <app-page-state
      [state]="state().kind"
      [messages]="{
        loadingTitleKey: 'auth.forgot_password.title',
        loadingMessageKey: 'auth.forgot_password.submit'
      }">
      @if (!isSubmitted()) {
        <form class="auth-form" (ngSubmit)="onSubmit()">
          <app-ui-field-input
            inputId="forgotPasswordEmail"
            type="email"
            autocomplete="email"
            iconClass="pi pi-envelope"
            labelKey="auth.login.title_email"
            placeholderKey="auth.login.mail_placeholder"
            [value]="email()"
            (valueChange)="onEmailChanged($event)">
          </app-ui-field-input>

          <button appUiButton="primary" type="submit" [disabled]="!email()">
            <i class="pi pi-send" aria-hidden="true"></i>
            <span>{{ 'auth.forgot_password.submit' | translate }}</span>
          </button>
        </form>
      } @else {
        <div class="auth-feedback auth-feedback--success">
          <app-ui-chip tone="lime" iconClass="pi pi-check-circle">{{ 'auth.forgot_password.sent_badge' | translate }}</app-ui-chip>
          <p>{{ message() }}</p>
        </div>
      }
    </app-page-state>
  </article>
</section>
