<section class="auth-page">
  <article class="auth-card" appUiSurface="panel" appUiSurfacePadding="spacious">
    <app-ui-section-header
      kickerTone="rose"
      kickerIconClass="pi pi-lock-open"
      kickerLabelKey="auth.reset_password.kicker"
      titleKey="auth.reset_password.title"
      subtitleKey="auth.reset_password.description">
    </app-ui-section-header>

    <app-page-state
      [state]="state().kind"
      [messages]="{
        loadingTitleKey: 'auth.reset_password.title',
        loadingMessageKey: 'auth.reset_password.submit'
      }">
      @if (!token()) {
        <div class="auth-feedback auth-feedback--error">
          <app-ui-chip tone="rose" iconClass="pi pi-times-circle">{{ 'auth.reset_password.invalid_badge' | translate }}</app-ui-chip>
          <p>{{ 'auth.reset_password.invalid_link' | translate }}</p>
        </div>
      } @else if (!isSubmitted()) {
        <form class="auth-form" (ngSubmit)="onSubmit()">
          <app-ui-field-input
            inputId="newPassword"
            type="password"
            autocomplete="new-password"
            iconClass="pi pi-lock"
            labelKey="auth.login.title_password"
            [value]="newPassword()"
            (valueChange)="onNewPasswordChanged($event)">
          </app-ui-field-input>

          <app-ui-field-input
            inputId="confirmPassword"
            type="password"
            autocomplete="new-password"
            iconClass="pi pi-check-circle"
            labelKey="auth.register.password_confirm_placeholder"
            [value]="confirmPassword()"
            (valueChange)="onConfirmPasswordChanged($event)">
          </app-ui-field-input>

          <button appUiButton="primary" type="submit" [disabled]="!newPassword() || !confirmPassword()">
            <i class="pi pi-check" aria-hidden="true"></i>
            <span>{{ 'auth.reset_password.submit' | translate }}</span>
          </button>
        </form>
      } @else {
        <div class="auth-feedback auth-feedback--success">
          <app-ui-chip tone="lime" iconClass="pi pi-check-circle">{{ 'auth.reset_password.done_badge' | translate }}</app-ui-chip>
          <p>{{ message() }}</p>
        </div>
      }
    </app-page-state>
  </article>
</section>
