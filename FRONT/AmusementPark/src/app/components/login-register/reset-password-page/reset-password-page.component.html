<p-card styleClass="auth-page-card">
  <h2>{{ 'auth.reset_password.title' | translate }}</h2>

  <app-page-state
    [state]="state().kind"
    [messages]="{
      loadingTitleKey: 'auth.reset_password.title',
      loadingMessageKey: 'auth.reset_password.submit'
    }">
    @if (!token()) {
      <p class="auth-error">{{ 'auth.reset_password.invalid_link' | translate }}</p>
    } @else if (!isSubmitted()) {
      <form class="form-style" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">{{ 'auth.login.title_password' | translate }}</label>
          <input type="password" id="newPassword" name="newPassword" pInputText [ngModel]="newPassword()" (ngModelChange)="onNewPasswordChanged($event)">
        </div>
        <div class="form-group">
          <label for="confirmPassword">{{ 'auth.register.password_confirm_placeholder' | translate }}</label>
          <input type="password" id="confirmPassword" name="confirmPassword" pInputText [ngModel]="confirmPassword()" (ngModelChange)="onConfirmPasswordChanged($event)">
        </div>
        <button pButton type="submit" [label]="('auth.reset_password.submit' | translate)" [disabled]="!newPassword() || !confirmPassword()"></button>
      </form>
    } @else {
      <p>{{ message() }}</p>
    }
  </app-page-state>
</p-card>
