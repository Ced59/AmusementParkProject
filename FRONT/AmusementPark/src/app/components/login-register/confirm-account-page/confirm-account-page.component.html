<p-card styleClass="auth-page-card">
  <h2>{{ 'auth.confirm.title' | translate }}</h2>

  @if (isLoading) {
    <p>{{ 'auth.confirm.loading' | translate }}</p>
  } @else {
    <p [class.auth-success]="isSuccess" [class.auth-error]="!isSuccess">{{ message }}</p>
    <a [routerLink]="['/', currentLanguage, 'home']" class="app-link-reset">{{ 'auth.common.back_home' | translate }}</a>
  }
</p-card>
