<section class="parks-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Parks</h1>
      <p class="page-subtitle">
        Browse all available parks and open a detailed page for each destination.
      </p>
    </div>
  </div>

  <div class="app-grid-cards">
    @for (park of parks; track park) {
      <a
        class="park-link"
        [routerLink]="park.id && park.name ? ['/', currentLang, 'park', park.id, slugify(park.name)] : null">
        @if (park.id && park.name) {
          <p-card
            [header]="park.name"
            [subheader]="park.countryCode"
            styleClass="park-card">
            <ng-template pTemplate="content">
              <div class="park-card-content">
                <span class="app-chip">
                  <i class="pi pi-map-marker"></i>
                  {{ park.countryCode }}
                </span>
                <div class="park-meta">
                  <div>
                    <span class="meta-label">Latitude</span>
                    <strong>{{ park.latitude }}</strong>
                  </div>
                  <div>
                    <span class="meta-label">Longitude</span>
                    <strong>{{ park.longitude }}</strong>
                  </div>
                </div>
              </div>
            </ng-template>
          </p-card>
        }
      </a>
    }
  </div>

  @if (pagination) {
    <div class="pagination-wrap">
      <p-paginator
        [rows]="pagination.itemsPerPage"
        [totalRecords]="pagination.totalItems"
        [rowsPerPageOptions]="[5, 10, 50, 100]"
        [pageLinkSize]="3"
        (onPageChange)="onPageChange($event)">
      </p-paginator>
    </div>
  }
</section>
