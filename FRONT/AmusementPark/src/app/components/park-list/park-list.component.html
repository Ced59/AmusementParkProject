<section class="parks-page">
  <div class="parks-hero">
    <div>
      <span class="app-chip">
        <i class="pi pi-map"></i>
        {{ 'parks.heroBadge' | translate }}
      </span>

      <h1 class="page-title">{{ 'parks.title' | translate }}</h1>
      <p class="page-subtitle">
        {{ 'parks.subtitle' | translate }}
      </p>
    </div>
  </div>

  <div class="parks-toolbar">
    <div class="parks-toolbar__search">
      <label class="parks-toolbar__label">{{ 'parks.search.label' | translate }}</label>
      <input
        #parkSearchInput
        type="text"
        pInputText
        [value]="searchTerm"
        [placeholder]="'parks.search.placeholder' | translate"
        (input)="onSearchInput(parkSearchInput.value)" />
    </div>

    <button
      pButton
      type="button"
      class="p-button-text"
      icon="pi pi-times"
      [label]="'parks.search.clear' | translate"
      (click)="clearSearch()">
    </button>
  </div>

  <app-page-state
    [state]="pageState()"
    loadingTitleKey="parks.loadingTitle"
    loadingMessageKey="parks.loadingMessage"
    errorTitleKey="parks.errorTitle"
    errorMessageKey="parks.errorMessage"
    emptyTitleKey="parks.emptyTitle"
    emptyMessageKey="parks.emptyMessage">
    <div class="app-grid-cards">
      <app-park-card
        *ngFor="let park of parks()"
        [park]="park"
        [currentLang]="currentLang">
      </app-park-card>
    </div>

    <div class="pagination-wrap" *ngIf="pagination() as pageInfo">
      <p-paginator
        [rows]="pageInfo.itemsPerPage"
        [totalRecords]="pageInfo.totalItems"
        [rowsPerPageOptions]="[6, 9, 18, 36]"
        [pageLinkSize]="3"
        (onPageChange)="onPageChange($event)">
      </p-paginator>
    </div>
  </app-page-state>
</section>
