<div class="flex flex-column align-items-center mt-5">
  <!-- Grille des cards centrée horizontalement -->
  <div class="grid gap-3 justify-content-center">
    <div *ngFor="let park of parks" class="col-12 md:col-5 lg:col-3">
      <a *ngIf="park.id && park.name" [routerLink]="['/', currentLang, 'park', park.id, slugify(park.name)]">
        <p-card [header]="park.name" [subheader]="park.countryCode" styleClass="modern-card">
          <p>Coordinates: {{ park.latitude }}, {{ park.longitude }}</p>
        </p-card>
      </a>
    </div>
  </div>

  <!-- Paginator centré -->
  <div class="mt-3">
    <p-paginator [rows]="pagination?.itemsPerPage" [totalRecords]="pagination?.totalItems"
                 [rowsPerPageOptions]="[5, 10, 50, 100]" [pageLinkSize]="3"
                 (onPageChange)="onPageChange($event)" styleClass="paginator-custom"></p-paginator>
  </div>
</div>
