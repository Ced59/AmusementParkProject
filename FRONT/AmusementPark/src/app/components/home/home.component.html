<!-- src/app/components/home/home.component.html -->

<div class="flex flex-column align-items-center mt-5">
  <h2 class="mb-4">{{ 'home.home_title' | translate }}</h2>

  <div class="flex flex-column sm:flex-row align-items-center gap-3 w-11 sm:w-8">
    <input
      #searchInput
      type="text"
      class="p-inputtext p-component p-fluid flex-1"
      placeholder="{{ 'home.placeholder_search' | translate }}"
      (input)="onSearchInput(searchInput.value)"
    />

    <p-dropdown
      [options]="categoryOptions"
      [(ngModel)]="selectedCategory"
      placeholder="{{ 'home.placeholder_category' | translate }}"
      optionLabel="labelKey"
      optionValue="value"
      class="w-full sm:w-auto"
      (onChange)="onCategoryChange()"
    >
      <!-- Affiche la clé traduite lorsqu’une option est sélectionnée -->
      <ng-template let-opt pTemplate="selectedItem">
        {{ opt.labelKey | translate }}
      </ng-template>

      <!-- Affiche la liste des options, en traduisant labelKey -->
      <ng-template let-opt pTemplate="item">
        {{ opt.labelKey | translate }}
      </ng-template>
    </p-dropdown>
  </div>

  <div class="grid grid-nogutter mt-5 w-full sm:w-8">
    <ng-container *ngIf="results?.length; else noResults">
      <div *ngFor="let item of results" class="col-12 sm:col-6 lg:col-4 xl:col-3 p-2">
        <p-card [header]="item.title" class="h-full">
          <ng-template pTemplate="content">
            <p>{{ item.description }}</p>
          </ng-template>
        </p-card>
      </div>
    </ng-container>

    <ng-template #noResults>
      <p *ngIf="searchTerm || selectedCategory">
        {{ 'home.no_results' | translate }} “{{ searchTerm }}”
        <ng-container *ngIf="selectedCategory">
          {{ 'home.in_category' | translate }}
          {{ ('home.categories.' + selectedCategory) | translate }}
        </ng-container>
      </p>
    </ng-template>
  </div>

  <div class="mt-3" *ngIf="pagination">
    <p-paginator
      [rows]="pagination.itemsPerPage"
      [totalRecords]="pagination.totalItems"
      [rowsPerPageOptions]="[5,10,20]"
      (onPageChange)="onPageChange($event)"
    ></p-paginator>
  </div>
</div>
