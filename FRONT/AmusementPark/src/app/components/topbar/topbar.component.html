<p-toolbar styleClass="custom-toolbar">
  <ng-template pTemplate="start">
    <img src="assets/general-icon/logo-amusementpark.png" alt="Logo" class="logo">
    <span class="fun-text">Amusement Parks</span>
  </ng-template>

  <ng-template pTemplate="center">
    <p-dialog [header]="('topbar.choose_langage' | translate)" [(visible)]="displayLanguageModal" [modal]="true">
      <div class="languages-container">
        <button *ngFor="let language of languages" pButton class="language-button" (click)="selectLanguage(language.value)">
          <img [src]="'assets/flags/' + language.value + '.png'" class="flag" alt="{{ language.label }}">
          <span>{{ language.label }}</span>
        </button>
      </div>
    </p-dialog>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="menu-language">
      <button pButton class="language-button" (click)="openLanguageModal()">
        <img [src]="'assets/flags/' + selectedLanguage + '.png'" class="flag" alt="Language">
      </button>
    </div>

    <div *ngIf="isLoggedIn; else loginTemplate">
      <span>{{ 'topbar.hello' | translate }} {{ userEmail }}</span>
    </div>
    <ng-template #loginTemplate>
      <button pButton type="button" [label]="('topbar.login_header' | translate)" icon="pi pi-user" class="p-button-primary top-bar-button" (click)="openLoginModal()"></button>
    </ng-template>
  </ng-template>
</p-toolbar>
