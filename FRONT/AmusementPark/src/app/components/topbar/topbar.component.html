<p-toolbar>
  <div class="p-toolbar-group-left">
    <img src="assets/general-icon/logo-amusementpark.png" alt="Logo" class="logo">
    <span class="fun-text">Amusement Parks</span>
  </div>
  <div class="p-toolbar-group-right">
    <div class="menu-language">
      <p-dropdown [options]="languages" [(ngModel)]="selectedLanguage" (onChange)="changeLanguage($event.value)" [appendTo]="'body'">
        <ng-template let-language pTemplate="selectedItem">
          <div class="p-d-flex p-ai-center">
            <img [src]="'assets/flags/' + language.value + '.png'" class="flag" alt="">
            <span>{{language.label}}</span>
          </div>
        </ng-template>
        <ng-template let-language pTemplate="item">
          <div class="p-d-flex p-ai-center">
            <img [src]="'assets/flags/' + language.value + '.png'" class="flag" alt="">
            <span>{{language.label}}</span>
          </div>
        </ng-template>
      </p-dropdown>
    </div>
    <button pButton type="button" label="Login" icon="pi pi-user" class="p-button-secondary top-bar-button" (click)="openLoginModal()"></button>
  </div>

  <p-dialog header="Login" [(visible)]="displayLoginModal" [modal]="true" [style]="{width: '400px'}">
    <app-login-form></app-login-form> <!-- Le composant que vous créez pour les formulaires -->
  </p-dialog>
</p-toolbar>
