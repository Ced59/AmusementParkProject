<p-toolbar styleClass="app-topbar">
  <ng-template pTemplate="start">
    <a [routerLink]="['/', selectedLanguage || 'en', 'home']" class="brand-link">
      <img src="assets/general-icon/logo-amusementpark.png" alt="Logo" class="logo" />
      <div class="brand-copy">
        <span class="brand-title">Amusement Parks</span>
        <span class="brand-subtitle">{{ 'home.home_title' | translate }}</span>
      </div>
    </a>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="topbar-actions">
      @if (isLoggedIn) {
        <a [routerLink]="['/', selectedLanguage || 'en', 'profile']" class="profile-link">
          <div class="profile-copy">
            <span class="profile-kicker">{{ 'topbar.hello' | translate }}</span>
            <span class="profile-name">{{ userProfile?.firstname || userProfile?.email }}</span>
          </div>
          @if (userProfile?.avatar) {
            <p-avatar
              [image]="environment.apiBaseUrl + userProfile?.avatar"
              shape="circle">
            </p-avatar>
          }
          @if (!userProfile?.avatar) {
            <div class="profile-fallback">
              <i class="pi pi-user"></i>
            </div>
          }
        </a>
      } @else {
        <button
          pButton
          type="button"
          [label]="('topbar.login_header' | translate)"
          icon="pi pi-user"
          class="p-button-primary app-cta-button"
          (click)="openModal('loginModal')">
        </button>
      }


      <button
        pButton
        type="button"
        class="p-button-text language-trigger"
        (click)="openModal('languageModal')">
        <img [src]="'assets/flags/' + selectedLanguage + '.png'" class="flag" alt="Language" />
      </button>

      <app-theme-switcher></app-theme-switcher>
    </div>
  </ng-template>
</p-toolbar>

<p-dialog
  [header]="('topbar.choose_language' | translate)"
  [(visible)]="displayLanguageModal"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(92vw, 34rem)' }">
  <div class="languages-grid">
    @for (language of languages; track language) {
      <button
        pButton
        type="button"
        class="language-option"
        (click)="selectLanguage(language.value)">
        <img [src]="'assets/flags/' + language.value + '.png'" class="flag flag-large" alt="{{ language.label }}" />
        <span>{{ language.label }}</span>
      </button>
    }
  </div>
</p-dialog>

<p-dialog
  [header]="('topbar.login_header' | translate)"
  [(visible)]="displayLoginModal"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(96vw, 64rem)' }">
  <app-auth-modal (closeModal)="closeModal('loginModal')"></app-auth-modal>
</p-dialog>
