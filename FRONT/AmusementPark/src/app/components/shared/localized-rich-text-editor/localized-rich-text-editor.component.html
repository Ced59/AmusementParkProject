<div class="localized-rich-text-editor">
  <p-tabs [(value)]="activeTabIndex">
    <p-tablist>
      @for (entry of entries; track trackByLanguageCode(index, entry); let index = $index) {
        <p-tab [value]="index">
          {{ entry.languageLabel }}
        </p-tab>
      }
    </p-tablist>

    <p-tabpanels>
      @for (entry of entries; track trackByLanguageCode(index, entry); let index = $index) {
        <p-tabpanel [value]="index">
          <div class="localized-rich-text-editor__panel">
            <p-editor
              [(ngModel)]="entry.value"
              [ngModelOptions]="{ standalone: true }"
              [readonly]="isDisabled"
              [style]="{ height: editorHeight }"
              [placeholder]="placeholderKey | translate:{ language: entry.languageLabel }"
              (ngModelChange)="onEntryValueChange()">
              <ng-template pTemplate="header">
                <span class="ql-formats">
                  <button type="button" class="ql-bold" aria-label="Bold"></button>
                  <button type="button" class="ql-italic" aria-label="Italic"></button>
                  <button type="button" class="ql-underline" aria-label="Underline"></button>
                  <button type="button" class="ql-strike" aria-label="Strike"></button>
                </span>
                <span class="ql-formats">
                  <button type="button" class="ql-list" value="ordered" aria-label="Ordered list"></button>
                  <button type="button" class="ql-list" value="bullet" aria-label="Bullet list"></button>
                  <button type="button" class="ql-blockquote" aria-label="Blockquote"></button>
                  <button type="button" class="ql-link" aria-label="Link"></button>
                </span>
                <span class="ql-formats">
                  <button type="button" class="ql-clean" aria-label="Clear formatting"></button>
                </span>
              </ng-template>
            </p-editor>
          </div>
        </p-tabpanel>
      }
    </p-tabpanels>
  </p-tabs>
</div>
