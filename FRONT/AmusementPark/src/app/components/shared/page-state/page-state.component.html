<ng-container [ngSwitch]="state">
  <div *ngSwitchCase="viewState.Loading" class="app-page-state">
    <app-empty-state
      iconClass="pi pi-spin pi-spinner app-page-state__icon"
      [titleKey]="resolvedLoadingTitleKey"
      [messageKey]="resolvedLoadingMessageKey">
    </app-empty-state>
  </div>

  <div *ngSwitchCase="viewState.Error" class="app-page-state">
    <app-empty-state
      iconClass="pi pi-exclamation-circle app-page-state__icon"
      [titleKey]="resolvedErrorTitleKey"
      [messageKey]="resolvedErrorMessageKey">
    </app-empty-state>
  </div>

  <div *ngSwitchCase="viewState.Empty" class="app-page-state">
    <app-empty-state
      iconClass="pi pi-inbox app-page-state__icon"
      [titleKey]="resolvedEmptyTitleKey"
      [messageKey]="resolvedEmptyMessageKey">
    </app-empty-state>
  </div>

  <ng-content *ngSwitchDefault></ng-content>
</ng-container>
