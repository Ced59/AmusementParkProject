<app-admin-users-view
  [users]="users"
  [loading]="loading"
  [totalRecords]="totalRecords"
  [pageSize]="pageSize"
  [currentPage]="currentPage"
  [canShowHeaderTotal]="canShowHeaderTotal"
  [resolveAvatarUrlFn]="resolveAvatarUrl.bind(this)"
  [trackByUserIdFn]="trackByUserId.bind(this)"
  (pageChanged)="onPageChanged($event)"
  (userOpened)="openUserProfile($event)">
</app-admin-users-view>
