<div class="reference-edit-page">
  <app-admin-card class="admin-editor-card reference-editor-card">
    <h2>
      {{
        (isEditMode
          ? 'admin.parkFounders.editPage.updateTitle'
          : 'admin.parkFounders.editPage.createTitle') | translate
      }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="reference-form">
      <section class="form-section">
        <h3>{{ 'admin.references.sections.identity' | translate }}</h3>
        <div class="form-grid">
          <div class="field">
            <label for="name">{{ 'admin.parkFounders.editPage.name' | translate }}</label>
            <input id="name" type="text" formControlName="name" />
          </div>
          <div class="field">
            <label for="occupation">{{ 'admin.references.fields.occupation' | translate }}</label>
            <input id="occupation" type="text" formControlName="occupation" />
          </div>
          <div class="field">
            <label for="birthDate">{{ 'admin.references.fields.birthDate' | translate }}</label>
            <input id="birthDate" type="text" formControlName="birthDate" />
          </div>
          <div class="field">
            <label for="deathDate">{{ 'admin.references.fields.deathDate' | translate }}</label>
            <input id="deathDate" type="text" formControlName="deathDate" />
          </div>
          <div class="field">
            <label for="birthPlace">{{ 'admin.references.fields.birthPlace' | translate }}</label>
            <input id="birthPlace" type="text" formControlName="birthPlace" />
          </div>
          <div class="field">
            <label for="nationalityCountryCode">{{ 'admin.references.fields.nationalityCountryCode' | translate }}</label>
            <input id="nationalityCountryCode" type="text" formControlName="nationalityCountryCode" />
          </div>
          <div class="field field--wide">
            <label for="websiteUrl">{{ 'admin.references.fields.websiteUrl' | translate }}</label>
            <input id="websiteUrl" type="url" formControlName="websiteUrl" />
          </div>
        </div>
      </section>

      <section class="form-section">
        <h3>{{ 'admin.references.sections.content' | translate }}</h3>
        <div class="field">
          <label>{{ 'admin.parkFounders.editPage.biography' | translate }}</label>
          <app-localized-rich-text-editor formControlName="biography"></app-localized-rich-text-editor>
        </div>
      </section>

      <app-admin-reference-images
        *ngIf="isEditMode"
        [ownerId]="founderId"
        [ownerType]="imageOwnerType"
        [category]="imageCategory"
        [categoryOptions]="imageCategoryOptions">
      </app-admin-reference-images>

      <div class="form-actions">
        <button appAdminButton type="button" tone="secondary" (click)="onCancel()">{{ 'actions.cancel' | translate }}</button>
        <button appAdminButton type="submit">{{ 'actions.save' | translate }}</button>
      </div>
    </form>
  </app-admin-card>
</div>
