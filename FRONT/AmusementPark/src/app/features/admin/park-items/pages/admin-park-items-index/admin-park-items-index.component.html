<app-admin-park-items-index-view
  [state]="state"
  [loading]="loading"
  [rows]="rows"
  [parkOptions]="parkOptions"
  [totalRecords]="totalRecords"
  [selectedParkId]="selectedParkId()"
  [searchTerm]="searchTerm()"
  [visibilityFilter]="visibilityFilter()"
  [adminReviewStatusFilter]="adminReviewStatusFilter()"
  [categoryFilter]="categoryFilter()"
  [typeFilter]="typeFilter()"
  [contentBacklogFilter]="contentBacklogFilter()"
  [currentPage]="currentPage()"
  [pageSize]="pageSize()"
  [sortField]="sortField()"
  [sortOrder]="sortOrder()"
  [selectedItemIds]="selectedItemIds"
  [selectedCount]="selectedCount"
  [getCategoryLabelKeyFn]="getCategoryLabelKey.bind(this)"
  [getTypeLabelKeyFn]="getTypeLabelKey.bind(this)"
  (filtersChanged)="onFiltersChanged($event)"
  (pageChanged)="onPageChange($event)"
  (sortChanged)="onSortChange($event)"
  (editClicked)="goToEdit($event)"
  (quickDescriptionsClicked)="openQuickDescriptions($event)"
  (itemSelectionChanged)="onItemSelectionChanged($event)"
  (allItemsSelectionChanged)="onAllItemsSelectionChanged($event)"
  (bulkVisibilityChanged)="onBulkVisibilityChange($event)"
  (bulkStatusChanged)="onBulkStatusChange($event)"
  (selectionCleared)="clearSelection()">
</app-admin-park-items-index-view>

@if (quickDescriptionItem(); as item) {
  <section id="admin-quick-description-panel" class="admin-quick-description-panel" aria-live="polite" tabindex="-1">
    <div class="admin-quick-description-panel__header">
      <div>
        <span class="admin-kicker">{{ 'admin.parkItems.content.quickDescriptions' | translate }}</span>
        <h3>{{ 'admin.parkItems.content.quickDescriptionsTitle' | translate:{ name: item.name } }}</h3>
      </div>
      <button
        appUiButton
        type="button"
        icon="pi pi-times"
        class="p-button-text p-button-sm"
        [label]="'actions.close' | translate"
        (click)="closeQuickDescriptions()">
      </button>
    </div>

    <app-localized-rich-text-editor
      [ngModel]="quickDescriptionDraft()"
      [editorHeight]="'12rem'"
      (ngModelChange)="onQuickDescriptionDraftChange($event)">
    </app-localized-rich-text-editor>

    <div class="admin-quick-description-panel__actions">
      <button
        appUiButton
        type="button"
        icon="pi pi-save"
        [disabled]="isSavingQuickDescription()"
        [label]="'actions.save' | translate"
        (click)="saveQuickDescriptions()">
      </button>
    </div>
  </section>
}
