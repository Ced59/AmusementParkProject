<div class="page-header">
  <button
    pButton
    type="button"
    label="Retour aux sources"
    icon="pi pi-arrow-left"
    class="p-button-text p-button-sm"
    (click)="back.emit()">
  </button>
  <h2 class="page-title"><i class="pi pi-cloud-download"></i> Captain Coaster — Acquisition automatisée</h2>
</div>

<div class="messages" *ngIf="errorMessage() || successMessage()">
  <p class="message message--error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
  <p class="message message--success" *ngIf="successMessage()">{{ successMessage() }}</p>
</div>

<p-tabs value="0">
  <p-tablist>
    <p-tab value="0"><i class="pi pi-cog"></i> Acquisition</p-tab>
    <p-tab value="1" [disabled]="session() === null">
      <i class="pi pi-chart-bar"></i> Progression
      <span *ngIf="isSessionRunning()" class="tab-pulse">●</span>
    </p-tab>
    <p-tab value="2">
      <i class="pi pi-list"></i> Comparaison
      <span *ngIf="totalCount() > 0" class="tab-badge">{{ totalCount() }}</span>
    </p-tab>
  </p-tablist>

  <p-tabpanels>
    <p-tabpanel value="0">
      <app-captain-coaster-import-tab></app-captain-coaster-import-tab>
    </p-tabpanel>
    <p-tabpanel value="1">
      <app-captain-coaster-progress-tab></app-captain-coaster-progress-tab>
    </p-tabpanel>
    <p-tabpanel value="2">
      <app-captain-coaster-comparison-tab></app-captain-coaster-comparison-tab>
    </p-tabpanel>
  </p-tabpanels>
</p-tabs>
