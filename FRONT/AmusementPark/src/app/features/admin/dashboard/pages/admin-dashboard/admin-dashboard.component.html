<section class="admin-dashboard admin-surface">
  <header class="admin-dashboard__header">
    <span class="kicker kicker--sky">{{ 'admin.m14.kicker' | translate }}</span>
    <div>
      <h1 class="admin-page-title">{{ 'admin.dashboard.title' | translate }}</h1>
      <p class="admin-muted">{{ 'admin.dashboard.subtitle' | translate }}</p>
    </div>
  </header>

  <div class="admin-dashboard__grid" aria-label="Administration">
    @for (shortcut of shortcuts; track shortcut.segment) {
      <a class="admin-dashboard__shortcut" [routerLink]="buildAdminRoute(shortcut.segment)">
        <span class="admin-dashboard__shortcut-icon" aria-hidden="true">
          <i [class]="shortcut.iconClass"></i>
        </span>
        <span class="admin-dashboard__shortcut-body">
          <strong>{{ shortcut.titleKey | translate }}</strong>
          <span>{{ shortcut.descriptionKey | translate }}</span>
        </span>
      </a>
    }
  </div>
</section>
