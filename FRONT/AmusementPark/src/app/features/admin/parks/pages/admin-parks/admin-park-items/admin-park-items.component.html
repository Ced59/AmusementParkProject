<app-admin-park-items-index-view
  [state]="state"
  [loading]="loading"
  [rows]="items"
  [parkOptions]="emptyParkOptions"
  [totalRecords]="totalRecords"
  [selectedParkId]="parkId"
  [searchTerm]="searchTerm()"
  [visibilityFilter]="visibilityFilter()"
  [adminReviewStatusFilter]="adminReviewStatusFilter()"
  [categoryFilter]="categoryFilter()"
  [typeFilter]="typeFilter()"
  [currentPage]="currentPage()"
  [pageSize]="pageSize()"
  [sortField]="sortField()"
  [sortOrder]="sortOrder()"
  [selectedItemIds]="selectedItemIds"
  [selectedCount]="selectedCount"
  titleKey="admin.parks.items.title"
  subtitleKey="admin.parks.items.subtitle"
  totalKey="admin.parks.items.total"
  searchPlaceholderKey="admin.parks.items.searchPlaceholder"
  emptyMessageKey="admin.parks.items.empty"
  [showParkFilter]="false"
  [showParkColumn]="false"
  [showZoneColumn]="true"
  [showDeleteAction]="true"
  [showCreateButton]="true"
  [showQuickCreateButton]="true"
  [createButtonRouterLink]="getCreateRouterLink()"
  [getCategoryLabelKeyFn]="getCategoryLabelKey.bind(this)"
  [getTypeLabelKeyFn]="getTypeLabelKey.bind(this)"
  [getZoneLabelFn]="getZoneName.bind(this)"
  (quickCreateClicked)="openQuickCreate()"
  (filtersChanged)="onFiltersChanged($event)"
  (pageChanged)="onPageChange($event)"
  (sortChanged)="onSortChange($event)"
  (editClicked)="goToEdit($event)"
  (duplicateClicked)="duplicateItem($event)"
  (deleteClicked)="deleteItem($event)"
  (itemSelectionChanged)="onItemSelectionChanged($event)"
  (allItemsSelectionChanged)="onAllItemsSelectionChanged($event)"
  (bulkVisibilityChanged)="onBulkVisibilityChange($event)"
  (bulkStatusChanged)="onBulkStatusChange($event)"
  (selectionCleared)="clearSelection()">
</app-admin-park-items-index-view>

<app-admin-park-item-quick-create-drawer
  [isOpen]="quickCreateOpen()"
  [isCreating]="isQuickCreating()"
  [draft]="quickCreateDraft()"
  [zones]="zones()"
  [manufacturerOptions]="manufacturerOptions()"
  [duplicateWarnings]="quickCreateDuplicateWarnings()"
  [focusVersion]="quickCreateFocusVersion()"
  (draftChanged)="onQuickCreateDraftChanged($event)"
  (create)="createQuickItem($event)"
  (createAndNew)="createQuickItemAndNew($event)"
  (createAndOpen)="createQuickItemAndOpen($event)"
  (closed)="closeQuickCreate()">
</app-admin-park-item-quick-create-drawer>
