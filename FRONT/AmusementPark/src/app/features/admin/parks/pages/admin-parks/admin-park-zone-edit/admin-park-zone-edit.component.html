<app-ui-card styleClass="admin-editor-card admin-zone-editor-card">
  <h2>{{ (isEditMode ? 'admin.parks.zones.editTitle' : 'admin.parks.zones.createTitle') | translate }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-fluid">
    <div class="field">
      <label>{{ 'admin.parks.zones.name' | translate }}</label>
      <app-localized-text-input formControlName="names"></app-localized-text-input>
    </div>

    <div class="field">
      <label for="sortOrder">{{ 'admin.parks.zones.sortOrder' | translate }}</label>
      <input id="sortOrder" type="number" appUiInputText formControlName="sortOrder" />
    </div>

    <div class="field">
      <label>{{ 'admin.parks.visibleField' | translate }}</label>
      <app-ui-toggle-switch formControlName="isVisible"></app-ui-toggle-switch>
    </div>

    <div class="field">
      <label>{{ 'admin.parks.zones.description' | translate }}</label>
      <app-localized-rich-text-editor formControlName="descriptions"></app-localized-rich-text-editor>
    </div>

    <div class="actions-row">
      <button appUiButton type="button" class="p-button-secondary" (click)="goBack()" [label]="'actions.cancel' | translate"></button>
      <button appUiButton type="submit" [label]="'actions.save' | translate"></button>
    </div>
  </form>
</app-ui-card>
