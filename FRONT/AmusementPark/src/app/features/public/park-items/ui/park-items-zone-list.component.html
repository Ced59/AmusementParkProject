<section class="public-panel park-items-zones" *ngIf="zoneCards().length > 0">
  <div class="public-section-header park-items-zones__header">
    <div>
      <span class="public-kicker">
        <i class="pi pi-map"></i>
        {{ 'parkItems.filters.zone' | translate }}
      </span>
      <h2 class="public-section-header__title">{{ 'parkItems.filters.zone' | translate }}</h2>
      <p class="public-section-header__subtitle">{{ 'parkExplorer.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="zone-grid">
    <article
      class="public-zone-card zone-card"
      *ngFor="let zoneCard of zoneCards()"
      [class.zone-card--active]="zoneCard.isSelected">
      <div class="zone-card__header">
        <div>
          <h3>{{ zoneCard.name }}</h3>
          <p>{{ 'parkExplorer.totalItems' | translate:{ count: zoneCard.totalItems } }}</p>
        </div>

        <button
          pButton
          type="button"
          icon="pi pi-arrow-right"
          class="p-button-outlined p-button-sm"
          [label]="'parkItems.filters.zone' | translate"
          (click)="selectZone(zoneCard.id)"></button>
      </div>

      <div class="zone-card__meta" *ngIf="zoneCard.typeHighlights.length > 0">
        <span class="public-pill public-pill--soft" *ngFor="let typeCount of zoneCard.typeHighlights">
          {{ typeCount.labelKey | translate }} · {{ typeCount.count }}
        </span>
      </div>
    </article>
  </div>
</section>
