<section class="public-panel park-items-zones" appUiSurface="panel" appUiSurfacePadding="regular" *ngIf="zoneCards().length > 0">
  <app-ui-section-header
    class="park-items-zones__header"
    kickerIconClass="pi pi-map"
    kickerLabelKey="parkItems.filters.zone"
    titleKey="parkItems.filters.zone"
    subtitleKey="parkExplorer.subtitle">
  </app-ui-section-header>

  <div class="zone-grid">
    <article
      class="public-zone-card zone-card"
      *ngFor="let zoneCard of zoneCards()"
      [class.zone-card--active]="zoneCard.isSelected">
      <div class="zone-card__header">
        <div>
          <h3>{{ zoneCard.name }}</h3>
          <p>{{ 'publicCounts.placeWithCount' | localizedPlural:zoneCard.totalItems }}</p>
        </div>

        <button appUiButton="ghost" type="button" (click)="selectZone(zoneCard.id)">
          <i class="pi pi-arrow-right" aria-hidden="true"></i>
          <span>{{ 'parkItems.filters.zone' | translate }}</span>
        </button>
      </div>

      <div class="zone-card__meta" *ngIf="zoneCard.typeHighlights.length > 0">
        <app-ui-chip tone="soft" *ngFor="let typeCount of zoneCard.typeHighlights">
          {{ typeCount.labelKey | translate }} · {{ typeCount.count }}
        </app-ui-chip>
      </div>
    </article>
  </div>
</section>
