@if (park; as currentPark) {
  <section class="park-info">
    <app-ui-section-header
      class="park-section-header"
      kickerIconClass="pi pi-info-circle"
      kickerLabelKey="parks.detail.practical.title"
      titleKey="parks.detail.practical.title"
      subtitleKey="parks.detail.practical.subtitle">
    </app-ui-section-header>

    <app-ui-info-card
      kickerIconClass="pi pi-ticket"
      kickerLabelKey="parks.detail.heroBadge"
      [titleText]="currentPark.name"
      textKey="parks.detail.practical.subtitle"
      [metrics]="metrics"
      [primaryAction]="websiteAction">
    </app-ui-info-card>
  </section>
}
