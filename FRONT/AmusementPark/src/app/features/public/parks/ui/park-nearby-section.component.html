<section class="park-nearby public-page">
  <app-ui-section-header
    class="park-section-header"
    kickerIconClass="pi pi-map-marker"
    kickerLabelKey="parks.detail.nearby.title"
    titleKey="parks.detail.nearby.title"
    subtitleKey="parks.detail.nearby.subtitle">
  </app-ui-section-header>

  @if (nearestPark; as closestPark) {
    @if (closestPark.distanceLine) {
      <app-ui-distance-panel
        class="park-nearby__distance-panel"
        titleKey="parks.detail.nearby.closestTitle"
        [sourceLabel]="sourceName"
        [targetLabel]="closestPark.name"
        [distanceValue]="closestPark.distanceLine"
        [durationText]="closestPark.travelDurationLine ?? null"
        noteKey="parks.detail.nearby.distanceNote">
      </app-ui-distance-panel>
    }
  }

  <app-page-state
    [state]="state"
    [messages]="{
      loadingTitleKey: 'parks.detail.nearby.loadingTitle',
      loadingMessageKey: 'parks.detail.nearby.loadingMessage',
      errorTitleKey: 'parks.detail.nearby.errorTitle',
      errorMessageKey: 'parks.detail.nearby.errorMessage',
      emptyTitleKey: 'parks.detail.nearby.emptyTitle',
      emptyMessageKey: 'parks.detail.nearby.emptyMessage'
    }">
    <div class="park-nearby__grid">
      <app-ui-park-card
        *ngFor="let park of parks"
        [park]="park"
        [detailLink]="buildParkLink(park)"
        [showDescriptionInCompact]="true"
        [compact]="true">
      </app-ui-park-card>
    </div>
  </app-page-state>
</section>
