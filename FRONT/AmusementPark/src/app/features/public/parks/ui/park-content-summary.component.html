<section class="park-content-summary" *ngIf="summary && summary.itemsLink">
  <app-ui-section-header
    class="park-content-summary__header"
    kickerIconClass="pi pi-sitemap"
    kickerLabelKey="parkVisitor.summary.badge"
    titleKey="parkVisitor.summary.title"
    subtitleKey="parkVisitor.summary.subtitle">
    <a uiSectionActions appUiButton="ghost" [routerLink]="summary.itemsLink">
      <span>{{ 'parkVisitor.summary.viewAllItems' | translate }}</span>
      <i class="pi pi-arrow-right" aria-hidden="true"></i>
    </a>
  </app-ui-section-header>

  <div class="summary-grid">
    <a
      class="summary-card"
      *ngFor="let entry of summary.entries"
      [routerLink]="summary.itemsLink"
      [queryParams]="entry.queryParams ?? null">
      <div class="summary-card__icon">
        <i [class]="entry.icon"></i>
      </div>
      <div class="summary-card__body">
        <span class="summary-card__label">{{ entry.labelKey | localizedPlural:entry.count }}</span>
        <strong class="summary-card__count">{{ entry.count }}</strong>
      </div>
      <i class="pi pi-angle-right summary-card__arrow"></i>
    </a>
  </div>
</section>
