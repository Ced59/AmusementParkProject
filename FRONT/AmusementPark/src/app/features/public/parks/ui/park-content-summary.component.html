<section class="park-content-summary" *ngIf="summary && summary.itemsLink">
  <div class="public-section-header park-content-summary__header">
    <div>
      <span class="public-kicker">
        <i class="pi pi-sitemap"></i>
        {{ 'parkVisitor.summary.badge' | translate }}
      </span>
      <h2 class="public-section-header__title">{{ 'parkVisitor.summary.title' | translate }}</h2>
      <p class="public-section-header__subtitle">{{ 'parkVisitor.summary.subtitle' | translate }}</p>
    </div>

    <a
      pButton
      class="p-button-outlined"
      [routerLink]="summary.itemsLink"
      [label]="'parkVisitor.summary.viewAllItems' | translate"
      icon="pi pi-arrow-right">
    </a>
  </div>

  <div class="summary-grid">
    <a
      class="summary-card"
      *ngFor="let entry of summary.entries"
      [routerLink]="summary.itemsLink"
      [queryParams]="entry.queryParams ?? null">
      <div class="summary-card__icon">
        <i [class]="entry.icon"></i>
      </div>
      <div class="summary-card__body">
        <span class="summary-card__label">{{ entry.labelKey | translate }}</span>
        <strong class="summary-card__count">{{ entry.count }}</strong>
      </div>
      <i class="pi pi-angle-right summary-card__arrow"></i>
    </a>
  </div>
</section>
