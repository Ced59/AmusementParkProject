@if (park; as currentPark) {
  <app-ui-map-shell
    class="park-location"
    kickerIconClass="pi pi-map"
    kickerLabelKey="parks.detail.location.title"
    titleKey="parks.detail.location.title"
    subtitleKey="parks.detail.location.subtitle">
    <app-ui-map-slot uiMapShellMap [available]="hasCoordinates" minHeight="22rem">
      <app-leaflet-map
        [center]="center"
        [zoom]="11"
        [markers]="markers">
      </app-leaflet-map>
    </app-ui-map-slot>

    <app-ui-distance-panel
      uiMapShellSide
      titleKey="parks.detail.location.title"
      [sourceLabel]="currentPark.name"
      [metrics]="[
        { labelKey: 'parks.fields.latitude', value: currentPark.latitude, iconClass: 'pi pi-compass' },
        { labelKey: 'parks.fields.longitude', value: currentPark.longitude, iconClass: 'pi pi-compass' }
      ]">
    </app-ui-distance-panel>
  </app-ui-map-shell>
}
