<section class="park-location" *ngIf="park as currentPark">
  <app-ui-section-header
    class="park-section-header"
    kickerIconClass="pi pi-map"
    kickerLabelKey="parks.detail.location.title"
    titleKey="parks.detail.location.title"
    subtitleKey="parks.detail.location.subtitle">
  </app-ui-section-header>

  <div class="park-location__stats">
    <article class="park-location__stat">
      <span>{{ 'parks.fields.latitude' | translate }}</span>
      <strong>{{ currentPark.latitude }}</strong>
    </article>

    <article class="park-location__stat">
      <span>{{ 'parks.fields.longitude' | translate }}</span>
      <strong>{{ currentPark.longitude }}</strong>
    </article>
  </div>

  <app-leaflet-map
    *ngIf="hasCoordinates"
    [center]="center"
    [zoom]="11"
    [markers]="markers">
  </app-leaflet-map>
</section>
