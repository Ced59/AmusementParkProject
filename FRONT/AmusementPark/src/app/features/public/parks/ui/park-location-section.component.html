@if (park; as currentPark) {
  <section class="park-location-card info-card">
    <header class="info-card__header">
      <span class="info-card__header-icon info-card__header-icon--gold">
        <i class="pi pi-map" aria-hidden="true"></i>
      </span>
      <div>
        <h2 class="info-card__title">{{ 'parks.detail.location.title' | translate }}</h2>
        <p>{{ 'parks.detail.location.subtitle' | translate }}</p>
      </div>
    </header>

    <div class="park-location-card__body info-card__body">
      <app-ui-map-slot [available]="hasCoordinates" minHeight="15rem">
        <app-leaflet-static-map
          [center]="center"
          [zoom]="13"
          [markers]="markers">
        </app-leaflet-static-map>
      </app-ui-map-slot>

      @if (hasCoordinates) {
        <dl class="park-location-card__coordinates">
          <div>
            <dt>{{ 'parks.fields.latitude' | translate }}</dt>
            <dd>{{ currentPark.latitude }}</dd>
          </div>
          <div>
            <dt>{{ 'parks.fields.longitude' | translate }}</dt>
            <dd>{{ currentPark.longitude }}</dd>
          </div>
        </dl>
      }
    </div>
  </section>
}
