<section class="auth-form-card auth-form-card--register">
  <app-ui-kicker tone="lime" iconClass="pi pi-user-plus">
    {{ 'auth.register.title' | translate }}
  </app-ui-kicker>

  @if (!registrationCompleted) {
    <form class="auth-form" (ngSubmit)="onSubmit()">
      <app-ui-field-input
        inputId="registerEmail"
        type="email"
        autocomplete="email"
        iconClass="pi pi-envelope"
        labelKey="auth.register.title_email"
        placeholderKey="auth.register.mail_placeholder"
        [(value)]="registerEmail">
      </app-ui-field-input>

      <app-ui-field-input
        inputId="registerPassword"
        type="password"
        autocomplete="new-password"
        iconClass="pi pi-lock"
        labelKey="auth.register.title_password"
        placeholderKey="auth.register.password_placeholder"
        [(value)]="registerPassword">
      </app-ui-field-input>

      <small class="auth-form__help">{{ 'auth.register.password_info' | translate }}</small>

      <app-ui-field-input
        inputId="confirmPassword"
        type="password"
        autocomplete="new-password"
        iconClass="pi pi-check-circle"
        placeholderKey="auth.register.password_confirm_placeholder"
        [(value)]="confirmPassword">
      </app-ui-field-input>

      <button
        appUiButton="lime"
        type="submit"
        class="auth-form__submit"
        [disabled]="!isValidEmail() || !isValidPassword() || !passwordsMatch()">
        <i class="pi pi-send" aria-hidden="true"></i>
        <span>{{ 'auth.register.btn_text' | translate }}</span>
      </button>
    </form>
  } @else {
    <div class="auth-success-panel">
      <app-ui-chip tone="lime" iconClass="pi pi-check-circle">{{ 'auth.register.success_badge' | translate }}</app-ui-chip>
      <p>{{ 'auth.register.success_message' | translate }}</p>
      <button appUiButton="ghost" type="button" (click)="resendConfirmation()">
        {{ 'auth.register.resend_confirmation' | translate }}
      </button>
    </div>
  }
</section>
