<div class="app-route-layout app-public-layout">
  <app-public-header></app-public-header>
  <app-public-park-navigation-trail></app-public-park-navigation-trail>

  <main class="app-layout-main app-public-layout__main app-public-layout__content">
    <router-outlet></router-outlet>
  </main>

  <app-public-mobile-bottom-nav></app-public-mobile-bottom-nav>
  <app-public-footer></app-public-footer>

  @if (adminToolbarComponent(); as toolbarComponent) {
    <ng-container *ngComponentOutlet="toolbarComponent"></ng-container>
  }
</div>
