@if (isVisible()) {
  <section class="app-cookie-consent" role="region" [attr.aria-label]="'cookieConsent.ariaLabel' | translate">
    <div class="app-cookie-consent__inner">
      <div class="app-cookie-consent__icon" aria-hidden="true">
        <i class="pi pi-chart-line"></i>
      </div>

      <div class="app-cookie-consent__content">
        <h2 class="app-cookie-consent__title">{{ 'cookieConsent.title' | translate }}</h2>
        <p class="app-cookie-consent__text">
          {{ 'cookieConsent.text' | translate }}
          <a [routerLink]="['/', currentLanguage(), 'privacy']">{{ 'cookieConsent.privacyLink' | translate }}</a>
        </p>
      </div>

      <div class="app-cookie-consent__actions">
        <button type="button" class="app-cookie-consent__button app-cookie-consent__button--primary" (click)="acceptAnalytics()">
          {{ 'cookieConsent.accept' | translate }}
        </button>
        <button type="button" class="app-cookie-consent__button app-cookie-consent__button--ghost" (click)="continueWithoutAnalytics()">
          {{ 'cookieConsent.continueWithoutAnalytics' | translate }}
        </button>
      </div>
    </div>
  </section>
}
