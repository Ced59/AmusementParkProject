<article class="ui-result-card" [attr.data-tone]="kickerTone">
  <div class="ui-result-card__icon" aria-hidden="true">
    <i [class]="iconClass"></i>
  </div>

  <div class="ui-result-card__main">
    <div class="ui-result-card__header">
      @if (hasKicker) {
        <app-ui-kicker [tone]="kickerTone" [iconClass]="kickerIconClass">
          @if (kickerLabelKey) {
            {{ kickerLabelKey | translate }}
          } @else {
            {{ kickerText }}
          }
        </app-ui-kicker>
      }

      @if (hasBadge) {
        <app-ui-chip [tone]="badgeTone">
          @if (badgeLabelKey) {
            {{ badgeLabelKey | translate }}
          } @else {
            {{ badgeText }}
          }
        </app-ui-chip>
      }
    </div>

    <div class="ui-result-card__body">
      <h3 class="ui-result-card__title">{{ title }}</h3>
      @if (description) {
        <div class="ui-result-card__description" [innerHTML]="description | safeRichHtml"></div>
      }
    </div>
  </div>

  @if (routerLink) {
    <div class="ui-result-card__footer">
      <a appUiButton="ghost" [routerLink]="routerLink">
        <span>{{ actionLabelKey | translate }}</span>
        <i class="pi pi-arrow-right" aria-hidden="true"></i>
      </a>
    </div>
  }
</article>
