server {
  listen 8080;
  server_name _;

  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50m;

  location = /healthz {
    access_log off;
    include /etc/nginx/snippets/security-headers-base.conf;
    return 200 "ok\n";
  }


  location = /robots.txt {
    include /etc/nginx/snippets/security-headers-base.conf;
    include /etc/nginx/snippets/content-security-policy-report-only.conf;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Content-Security-Policy-Report-Only;
    proxy_pass http://amusementpark-api:8080/robots.txt;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
  }

  location = /sitemap.xml {
    include /etc/nginx/snippets/security-headers-base.conf;
    include /etc/nginx/snippets/content-security-policy-report-only.conf;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Content-Security-Policy-Report-Only;
    proxy_pass http://amusementpark-api:8080/sitemap.xml;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
  }

  location /sitemaps/ {
    include /etc/nginx/snippets/security-headers-base.conf;
    include /etc/nginx/snippets/content-security-policy-report-only.conf;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Content-Security-Policy-Report-Only;
    proxy_pass http://amusementpark-api:8080/sitemaps/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
  }

  location ~ ^/[A-Za-z0-9_-]+\.txt$ {
    include /etc/nginx/snippets/security-headers-base.conf;
    include /etc/nginx/snippets/content-security-policy-report-only.conf;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Content-Security-Policy-Report-Only;
    proxy_pass http://amusementpark-api:8080$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_redirect off;
  }

  location /api/ {
    include /etc/nginx/snippets/security-headers-base.conf;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Content-Security-Policy-Report-Only;
    proxy_pass http://amusementpark-api:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /api;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_redirect off;
    proxy_cookie_path /auth /api/auth;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
    include /etc/nginx/snippets/security-headers-base.conf;
    include /etc/nginx/snippets/content-security-policy-report-only.conf;
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  location / {
    include /etc/nginx/snippets/security-headers-base.conf;
    include /etc/nginx/snippets/content-security-policy-report-only.conf;
    try_files $uri $uri/ /index.html;
  }
}
