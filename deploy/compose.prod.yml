name: amusementpark

services:
  front:
    image: ${FRONT_IMAGE:?FRONT_IMAGE is required}
    container_name: amusementpark-front
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PUBLIC_HTTP_PORT:-18080}:4000"
    cpus: ${FRONT_CPUS:-1.5}
    mem_limit: ${FRONT_MEMORY_LIMIT:-1536m}
    memswap_limit: ${FRONT_MEMORY_SWAP_LIMIT:-2g}
    pids_limit: ${FRONT_PIDS_LIMIT:-256}
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${FRONT_NODE_OPTIONS:---max-old-space-size=1024}
      PORT: 4000
      SSR_API_INTERNAL_URL: ${FRONT_SSR_API_INTERNAL_URL:-http://api:8080}
      SSR_CSP_ENABLED: ${CSP_ENABLED:-true}
      SSR_CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-true}
      SSR_CSP_REPORT_URI: ${FRONT_CSP_REPORT_URI:-/api/security/csp-report}
      SSR_CSP_ALLOW_LOCAL_DEV_SOURCES: ${SSR_CSP_ALLOW_LOCAL_DEV_SOURCES:-false}
      SSR_ALLOWED_HOSTS: ${SSR_ALLOWED_HOSTS:?SSR_ALLOWED_HOSTS is required}
      SSR_FORCE_HTTPS: ${SSR_FORCE_HTTPS:-true}
      SSR_RENDER_ENABLED: ${SSR_RENDER_ENABLED:-true}
      SSR_RENDER_ON_CACHE_MISS: ${SSR_RENDER_ON_CACHE_MISS:-false}
      SSR_RENDER_CRITICAL_ROUTES_ON_CACHE_MISS: ${SSR_RENDER_CRITICAL_ROUTES_ON_CACHE_MISS:-true}
      SSR_ROBOT_NO_JS_HTML_ENABLED: ${SSR_ROBOT_NO_JS_HTML_ENABLED:-true}
      SSR_SEO_DOCUMENT_CACHE_SECONDS: ${SSR_SEO_DOCUMENT_CACHE_SECONDS:-0}
      SSR_SEO_DOCUMENT_CACHE_MAX_ENTRIES: ${SSR_SEO_DOCUMENT_CACHE_MAX_ENTRIES:-128}
      SSR_SEO_DOCUMENT_BROWSER_CACHE_CONTROL: ${SSR_SEO_DOCUMENT_BROWSER_CACHE_CONTROL:-no-cache, max-age=0, must-revalidate}
      SSR_CACHE_INVALIDATION_TOKEN: ${SSR_CACHE_INVALIDATION_TOKEN:?SSR_CACHE_INVALIDATION_TOKEN is required}
      SSR_PAGE_CACHE_SECONDS: ${SSR_PAGE_CACHE_SECONDS:-86400}
      SSR_PAGE_CACHE_MAX_ENTRIES: ${SSR_PAGE_CACHE_MAX_ENTRIES:-2000}
      SSR_PAGE_CACHE_BROWSER_CACHE_CONTROL: ${SSR_PAGE_CACHE_BROWSER_CACHE_CONTROL:-no-store, max-age=0}
      SSR_STALE_PAGE_CACHE_SECONDS: ${SSR_STALE_PAGE_CACHE_SECONDS:-600}
      SSR_TARGETED_REFRESH_ENABLED: ${SSR_TARGETED_REFRESH_ENABLED:-true}
      SSR_TARGETED_REFRESH_MAX_URLS: ${SSR_TARGETED_REFRESH_MAX_URLS:-24}
      SSR_TARGETED_REFRESH_CONCURRENCY: ${SSR_TARGETED_REFRESH_CONCURRENCY:-1}
      SSR_TARGETED_REFRESH_DELAY_MILLISECONDS: ${SSR_TARGETED_REFRESH_DELAY_MILLISECONDS:-1500}
      SSR_TARGETED_REFRESH_TIMEOUT_SECONDS: ${SSR_TARGETED_REFRESH_TIMEOUT_SECONDS:-45}
      SSR_RENDER_MAX_CONCURRENCY: ${SSR_RENDER_MAX_CONCURRENCY:-1}
      SSR_RENDER_QUEUE_MAX_ENTRIES: ${SSR_RENDER_QUEUE_MAX_ENTRIES:-8}
      SSR_RENDER_QUEUE_WARNING_THRESHOLD: ${SSR_RENDER_QUEUE_WARNING_THRESHOLD:-6}
      SSR_RENDER_SEO_READY_RETRY_COUNT: ${SSR_RENDER_SEO_READY_RETRY_COUNT:-3}
      SSR_RENDER_SEO_READY_RETRY_DELAY_MILLISECONDS: ${SSR_RENDER_SEO_READY_RETRY_DELAY_MILLISECONDS:-500}
      SSR_SLOW_RENDER_THRESHOLD_MILLISECONDS: ${SSR_SLOW_RENDER_THRESHOLD_MILLISECONDS:-3000}
      SSR_PUBLIC_PAGE_CACHE_ALLOW_AUTH_COOKIES: ${SSR_PUBLIC_PAGE_CACHE_ALLOW_AUTH_COOKIES:-true}
      SSR_DISK_PAGE_CACHE_ENABLED: ${SSR_DISK_PAGE_CACHE_ENABLED:-true}
      SSR_DISK_PAGE_CACHE_DIR: ${SSR_DISK_PAGE_CACHE_DIR:-/var/cache/amusementpark-ssr}
      SSR_DISK_PAGE_CACHE_MAX_BYTES: ${SSR_DISK_PAGE_CACHE_MAX_BYTES:-4294967296}
      SSR_DISK_PAGE_CACHE_BUDGET_CHECK_EVERY_WRITES: ${SSR_DISK_PAGE_CACHE_BUDGET_CHECK_EVERY_WRITES:-100}
      SSR_DISK_PAGE_CACHE_STATS_INTERVAL_SECONDS: ${SSR_DISK_PAGE_CACHE_STATS_INTERVAL_SECONDS:-300}
      SSR_DISK_PAGE_CACHE_STATS_BATCH_SIZE: ${SSR_DISK_PAGE_CACHE_STATS_BATCH_SIZE:-100}
      SSR_DISK_PAGE_CACHE_STATS_YIELD_MILLISECONDS: ${SSR_DISK_PAGE_CACHE_STATS_YIELD_MILLISECONDS:-0}
      SSR_PAGE_CACHE_MAX_HTML_BYTES: ${SSR_PAGE_CACHE_MAX_HTML_BYTES:-2097152}
      SSR_PUBLIC_HTML_SITEMAP_PAGE_CACHE_MAX_HTML_BYTES: ${SSR_PUBLIC_HTML_SITEMAP_PAGE_CACHE_MAX_HTML_BYTES:-10485760}
      SSR_TECHNICAL_STATS_PERSISTENCE_ENABLED: ${SSR_TECHNICAL_STATS_PERSISTENCE_ENABLED:-true}
      SSR_TECHNICAL_STATS_RETENTION_DAYS: ${SSR_TECHNICAL_STATS_RETENTION_DAYS:-100}
      SSR_TECHNICAL_STATS_FLUSH_INTERVAL_SECONDS: ${SSR_TECHNICAL_STATS_FLUSH_INTERVAL_SECONDS:-60}
      SSR_ASSET_MISS_LOG_SAMPLE_RATE: ${SSR_ASSET_MISS_LOG_SAMPLE_RATE:-25}
      SSR_CSR_FALLBACK_LOG_SAMPLE_RATE: ${SSR_CSR_FALLBACK_LOG_SAMPLE_RATE:-100}
      SSR_CSR_FALLBACK_CACHE_CONTROL: ${SSR_CSR_FALLBACK_CACHE_CONTROL:-public, max-age=60, stale-while-revalidate=300}
    networks:
      npm_proxy_external:
        aliases:
          - amusementpark-front
          - amusementpark-front-ssr
      backend_private:
        aliases:
          - amusementpark-front
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header=\"X-Forwarded-Proto: https\" --spider http://127.0.0.1:4000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - ssr_page_cache:/var/cache/amusementpark-ssr
    tmpfs:
      - /tmp

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: amusementpark-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      Diagnostics__PerformanceLogging__Enabled: ${API_PERF_LOGGING_ENABLED:-true}
      Diagnostics__PerformanceLogging__LogAllRequests: ${API_PERF_LOGGING_LOG_ALL_REQUESTS:-false}
      Diagnostics__PerformanceLogging__SlowRequestThresholdMilliseconds: ${API_PERF_LOGGING_SLOW_REQUEST_THRESHOLD_MS:-750}
      Diagnostics__PerformanceLogging__AlwaysLogStatusCodeAtLeast: ${API_PERF_LOGGING_ALWAYS_LOG_STATUS_CODE_AT_LEAST:-500}
      AllowedHosts: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      ForwardedHeaders__ForwardLimit: ${FORWARDED_HEADERS_FORWARD_LIMIT:-2}
      ForwardedHeaders__KnownProxies__0: "127.0.0.1"
      ForwardedHeaders__KnownProxies__1: "::1"
      ForwardedHeaders__KnownNetworks__0: ${FORWARDED_HEADERS_KNOWN_NETWORKS:?FORWARDED_HEADERS_KNOWN_NETWORKS is required}
      ForwardedHeaders__AllowedHosts__0: ${FORWARDED_HEADERS_ALLOWED_HOSTS:?FORWARDED_HEADERS_ALLOWED_HOSTS is required}
      Security__ContentSecurityPolicy__Enabled: ${CSP_ENABLED:-true}
      Security__ContentSecurityPolicy__ReportOnly: ${CSP_REPORT_ONLY:-true}
      Security__ContentSecurityPolicy__ReportUri: ${CSP_REPORT_URI:-/security/csp-report}
      RateLimiting__Authentication__Login__PermitLimit: ${AUTH_RATE_LIMIT_LOGIN_LIMIT:-5}
      RateLimiting__Authentication__Login__WindowSeconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:-60}
      RateLimiting__Authentication__ExternalLogin__PermitLimit: ${AUTH_RATE_LIMIT_EXTERNAL_LOGIN_LIMIT:-10}
      RateLimiting__Authentication__ExternalLogin__WindowSeconds: ${AUTH_RATE_LIMIT_EXTERNAL_LOGIN_WINDOW_SECONDS:-60}
      RateLimiting__Authentication__RefreshToken__PermitLimit: ${AUTH_RATE_LIMIT_REFRESH_TOKEN_LIMIT:-30}
      RateLimiting__Authentication__RefreshToken__WindowSeconds: ${AUTH_RATE_LIMIT_REFRESH_TOKEN_WINDOW_SECONDS:-60}
      RateLimiting__Authentication__Registration__PermitLimit: ${AUTH_RATE_LIMIT_REGISTRATION_LIMIT:-5}
      RateLimiting__Authentication__Registration__WindowSeconds: ${AUTH_RATE_LIMIT_REGISTRATION_WINDOW_SECONDS:-900}
      RateLimiting__Authentication__EmailChallenge__PermitLimit: ${AUTH_RATE_LIMIT_EMAIL_CHALLENGE_LIMIT:-3}
      RateLimiting__Authentication__EmailChallenge__WindowSeconds: ${AUTH_RATE_LIMIT_EMAIL_CHALLENGE_WINDOW_SECONDS:-900}
      RateLimiting__Authentication__PasswordReset__PermitLimit: ${AUTH_RATE_LIMIT_PASSWORD_RESET_LIMIT:-5}
      RateLimiting__Authentication__PasswordReset__WindowSeconds: ${AUTH_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:-900}
      MongoDB__Url: mongodb://${MONGO_APP_USERNAME_URL_ENCODED:?MONGO_APP_USERNAME_URL_ENCODED is required}:${MONGO_APP_PASSWORD_URL_ENCODED:?MONGO_APP_PASSWORD_URL_ENCODED is required}@mongodb:27017/${MONGO_DATABASE_NAME:-AmusementPark}?authSource=${MONGO_DATABASE_NAME:-AmusementPark}
      MongoDB__DatabaseName: ${MONGO_DATABASE_NAME:-AmusementPark}
      Images__MinIo__Endpoint: minio:9000
      Images__MinIo__AccessKey: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      Images__MinIo__SecretKey: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      Images__MinIo__WithSsl: "false"
      Images__MinIo__Bucket: ${MINIO_BUCKET:-amusement-park-images}
      Authentication__Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Authentication__Jwt__Issuer: ${JWT_ISSUER:?JWT_ISSUER is required}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE:?JWT_AUDIENCE is required}
      Authentication__Local__FrontendBaseUrl: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      Seo__PublicBaseUrl: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      Seo__DefaultLanguage: ${SEO_DEFAULT_LANGUAGE:-en}
      Seo__AhrefsCrawlDelaySeconds: ${SEO_AHREFS_CRAWL_DELAY_SECONDS:-2}
      Seo__SupportedLanguages__0: en
      Seo__SupportedLanguages__1: fr
      Seo__SupportedLanguages__2: es
      Seo__SupportedLanguages__3: de
      Seo__SupportedLanguages__4: it
      Seo__SupportedLanguages__5: pl
      Seo__SupportedLanguages__6: nl
      Seo__SupportedLanguages__7: pt
      Ssr__InternalBaseUrl: ${SSR_INTERNAL_BASE_URL:-http://front:4000}
      Ssr__CacheInvalidationToken: ${SSR_CACHE_INVALIDATION_TOKEN:?SSR_CACHE_INVALIDATION_TOKEN is required}
      Authentication__RefreshTokenCookie__Name: amusementpark.refresh
      Authentication__RefreshTokenCookie__Path: /api/auth
      Authentication__RefreshTokenCookie__HttpOnly: "true"
      Authentication__RefreshTokenCookie__Secure: "true"
      Authentication__RefreshTokenCookie__SameSite: None
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Authentication__Google__RedirectUri: ${GOOGLE_REDIRECT_URI:-}
      Authentication__Facebook__AppId: ${FACEBOOK_APP_ID:-}
      Authentication__Facebook__AppSecret: ${FACEBOOK_APP_SECRET:-}
      Cors__AllowedOriginsCsv: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required};${PUBLIC_WWW_BASE_URL:-}
      Cors__AllowedMethods__0: GET
      Cors__AllowedMethods__1: POST
      Cors__AllowedMethods__2: PUT
      Cors__AllowedMethods__3: PATCH
      Cors__AllowedMethods__4: DELETE
      Cors__AllowedMethods__5: OPTIONS
      Cors__AllowedHeaders__0: Authorization
      Cors__AllowedHeaders__1: Content-Type
      Cors__AllowedHeaders__2: Accept-Language
      Cors__AllowedHeaders__3: X-Requested-With
      Cors__ExposedHeaders__0: Retry-After
      Cors__ExposedHeaders__1: X-Rate-Limit-Limit
      Cors__ExposedHeaders__2: X-Rate-Limit-Remaining
      Cors__ExposedHeaders__3: X-Rate-Limit-Reset
      Cors__AllowCredentials: "true"
      Email__Mode: ${EMAIL_MODE:-Smtp}
      Email__Host: ${EMAIL_HOST:-}
      Email__Port: ${EMAIL_PORT:-587}
      Email__UseSsl: ${EMAIL_USE_SSL:-false}
      Email__UseStartTls: ${EMAIL_USE_STARTTLS:-true}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@amusement-parks.fun}
      Email__FromName: ${EMAIL_FROM_NAME:-Amusement Park}
      Email__Notifications__AdminAddress: ${EMAIL_NOTIFICATION_ADMIN_ADDRESS:-admin@amusement-parks.fun}
      Email__Notifications__ContactAddress: ${EMAIL_CONTACT_ADDRESS:-contact@amusement-parks.fun}
      Email__Notifications__ContactNotificationsEnabled: ${EMAIL_CONTACT_NOTIFICATIONS_ENABLED:-true}
      Email__Notifications__WeatherRunNotificationsEnabled: ${EMAIL_WEATHER_NOTIFICATIONS_ENABLED:-true}
      Initialization__AdminUser__Enabled: ${ADMIN_USER_ENABLED:-false}
      Initialization__AdminUser__Email: ${ADMIN_USER_EMAIL:-}
      Initialization__AdminUser__Password: ${ADMIN_USER_PASSWORD:-}
    networks:
      - backend_private
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Host: localhost\" -H \"X-Forwarded-Proto: https\" http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    security_opt:
      - no-new-privileges:true

  mongodb:
    image: mongo:8.0
    container_name: amusementpark-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_APP_DATABASE: ${MONGO_DATABASE_NAME:-AmusementPark}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:?MONGO_APP_USERNAME is required}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-amusementpark-app-user.js:ro
    networks:
      - backend_private
    healthcheck:
      test:
        - CMD-SHELL
        - bash -ec 'exec 3<>/dev/tcp/127.0.0.1/27017'
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 90s
    security_opt:
      - no-new-privileges:true

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z}
    container_name: amusementpark-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-19001}:9001"
    networks:
      - backend_private
    security_opt:
      - no-new-privileges:true


networks:
  npm_proxy_external:
    name: ${NPM_DOCKER_NETWORK_NAME:-nginx-proxy-network}
    external: true
  backend_private:
    driver: bridge
    ipam:
      config:
        - subnet: ${BACKEND_PRIVATE_SUBNET:-172.30.31.0/24}

volumes:
  mongodb_data:
  minio_data:
  ssr_page_cache:
