name: amusementpark

services:
  front:
    image: ${FRONT_IMAGE:?FRONT_IMAGE is required}
    container_name: amusementpark-front
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PUBLIC_HTTP_PORT:-8080}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      SSR_API_INTERNAL_URL: ${FRONT_SSR_API_INTERNAL_URL:-http://api:8080}
      SSR_CSP_ENABLED: ${CSP_ENABLED:-true}
      SSR_CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-true}
      SSR_CSP_REPORT_URI: ${FRONT_CSP_REPORT_URI:-/api/security/csp-report}
    networks:
      - public_edge
      - backend_private
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: amusementpark-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      ForwardedHeaders__ForwardLimit: ${FORWARDED_HEADERS_FORWARD_LIMIT:-2}
      ForwardedHeaders__KnownProxies__0: "127.0.0.1"
      ForwardedHeaders__KnownProxies__1: "::1"
      ForwardedHeaders__KnownNetworks__0: ${FORWARDED_HEADERS_KNOWN_NETWORKS:?FORWARDED_HEADERS_KNOWN_NETWORKS is required}
      ForwardedHeaders__AllowedHosts__0: ${FORWARDED_HEADERS_ALLOWED_HOSTS:?FORWARDED_HEADERS_ALLOWED_HOSTS is required}
      Security__ContentSecurityPolicy__Enabled: ${CSP_ENABLED:-true}
      Security__ContentSecurityPolicy__ReportOnly: ${CSP_REPORT_ONLY:-true}
      Security__ContentSecurityPolicy__ReportUri: ${CSP_REPORT_URI:-/security/csp-report}
      RateLimiting__Authentication__Login__PermitLimit: ${AUTH_RATE_LIMIT_LOGIN_LIMIT:-5}
      RateLimiting__Authentication__Login__WindowSeconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:-60}
      RateLimiting__Authentication__ExternalLogin__PermitLimit: ${AUTH_RATE_LIMIT_EXTERNAL_LOGIN_LIMIT:-10}
      RateLimiting__Authentication__ExternalLogin__WindowSeconds: ${AUTH_RATE_LIMIT_EXTERNAL_LOGIN_WINDOW_SECONDS:-60}
      RateLimiting__Authentication__RefreshToken__PermitLimit: ${AUTH_RATE_LIMIT_REFRESH_TOKEN_LIMIT:-30}
      RateLimiting__Authentication__RefreshToken__WindowSeconds: ${AUTH_RATE_LIMIT_REFRESH_TOKEN_WINDOW_SECONDS:-60}
      RateLimiting__Authentication__Registration__PermitLimit: ${AUTH_RATE_LIMIT_REGISTRATION_LIMIT:-5}
      RateLimiting__Authentication__Registration__WindowSeconds: ${AUTH_RATE_LIMIT_REGISTRATION_WINDOW_SECONDS:-900}
      RateLimiting__Authentication__EmailChallenge__PermitLimit: ${AUTH_RATE_LIMIT_EMAIL_CHALLENGE_LIMIT:-3}
      RateLimiting__Authentication__EmailChallenge__WindowSeconds: ${AUTH_RATE_LIMIT_EMAIL_CHALLENGE_WINDOW_SECONDS:-900}
      RateLimiting__Authentication__PasswordReset__PermitLimit: ${AUTH_RATE_LIMIT_PASSWORD_RESET_LIMIT:-5}
      RateLimiting__Authentication__PasswordReset__WindowSeconds: ${AUTH_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:-900}
      MongoDB__Url: mongodb://${MONGO_APP_USERNAME:?MONGO_APP_USERNAME is required}:${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}@mongodb:27017/${MONGO_DATABASE_NAME:-AmusementPark}?authSource=${MONGO_DATABASE_NAME:-AmusementPark}
      MongoDB__DatabaseName: ${MONGO_DATABASE_NAME:-AmusementPark}
      Images__MinIo__Endpoint: minio:9000
      Images__MinIo__AccessKey: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      Images__MinIo__SecretKey: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      Images__MinIo__WithSsl: "false"
      Images__MinIo__Bucket: ${MINIO_BUCKET:-amusement-park-images}
      Authentication__Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Authentication__Jwt__Issuer: ${JWT_ISSUER:?JWT_ISSUER is required}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE:?JWT_AUDIENCE is required}
      Authentication__Local__FrontendBaseUrl: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      Seo__PublicBaseUrl: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      Seo__DefaultLanguage: ${SEO_DEFAULT_LANGUAGE:-en}
      Seo__MaxDynamicUrlsPerType: ${SEO_MAX_DYNAMIC_URLS_PER_TYPE:-50}
      Seo__SupportedLanguages__0: en
      Seo__SupportedLanguages__1: fr
      Seo__SupportedLanguages__2: es
      Seo__SupportedLanguages__3: de
      Seo__SupportedLanguages__4: it
      Seo__SupportedLanguages__5: pl
      Seo__SupportedLanguages__6: nl
      Seo__SupportedLanguages__7: pt
      Authentication__RefreshTokenCookie__Name: amusementpark.refresh
      Authentication__RefreshTokenCookie__Path: /api/auth
      Authentication__RefreshTokenCookie__HttpOnly: "true"
      Authentication__RefreshTokenCookie__Secure: "true"
      Authentication__RefreshTokenCookie__SameSite: None
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Authentication__Google__RedirectUri: ${GOOGLE_REDIRECT_URI:-}
      Authentication__Facebook__AppId: ${FACEBOOK_APP_ID:-}
      Authentication__Facebook__AppSecret: ${FACEBOOK_APP_SECRET:-}
      Cors__AllowedOrigins__0: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      Cors__AllowedOrigins__1: ${PUBLIC_WWW_BASE_URL:-}
      Cors__AllowedMethods__0: GET
      Cors__AllowedMethods__1: POST
      Cors__AllowedMethods__2: PUT
      Cors__AllowedMethods__3: PATCH
      Cors__AllowedMethods__4: DELETE
      Cors__AllowedMethods__5: OPTIONS
      Cors__AllowedHeaders__0: Authorization
      Cors__AllowedHeaders__1: Content-Type
      Cors__AllowedHeaders__2: Accept-Language
      Cors__AllowedHeaders__3: X-Requested-With
      Cors__ExposedHeaders__0: Retry-After
      Cors__ExposedHeaders__1: X-Rate-Limit-Limit
      Cors__ExposedHeaders__2: X-Rate-Limit-Remaining
      Cors__ExposedHeaders__3: X-Rate-Limit-Reset
      Cors__AllowCredentials: "true"
      Email__Mode: ${EMAIL_MODE:-Console}
      Email__Host: ${EMAIL_HOST:-}
      Email__Port: ${EMAIL_PORT:-587}
      Email__UseSsl: ${EMAIL_USE_SSL:-false}
      Email__UseStartTls: ${EMAIL_USE_STARTTLS:-true}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@amusement-parks.fun}
      Email__FromName: ${EMAIL_FROM_NAME:-Amusement Park}
      Initialization__AdminUser__Enabled: ${ADMIN_USER_ENABLED:-false}
      Initialization__AdminUser__Email: ${ADMIN_USER_EMAIL:-}
      Initialization__AdminUser__Password: ${ADMIN_USER_PASSWORD:-}
    networks:
      - backend_private
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header=\"X-Forwarded-Proto: https\" --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  mongodb:
    image: mongo:8.0
    container_name: amusementpark-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_APP_DATABASE: ${MONGO_DATABASE_NAME:-AmusementPark}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:?MONGO_APP_USERNAME is required}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-amusementpark-app-user.js:ro
    networks:
      - backend_private
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@127.0.0.1:27017/admin | grep 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z}
    container_name: amusementpark-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - backend_private
    security_opt:
      - no-new-privileges:true


networks:
  public_edge:
    driver: bridge
    ipam:
      config:
        - subnet: ${PUBLIC_EDGE_SUBNET:-172.30.30.0/24}
  backend_private:
    driver: bridge
    ipam:
      config:
        - subnet: ${BACKEND_PRIVATE_SUBNET:-172.30.31.0/24}

volumes:
  mongodb_data:
  minio_data:
