name: amusementpark-dev-infra

services:
  mongodb:
    image: mongo:8.0
    container_name: amusementpark-dev-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - amusementpark_dev_mongodb_data:/data/db

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z}
    container_name: amusementpark-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - amusementpark_dev_minio_data:/data

volumes:
  amusementpark_dev_mongodb_data:
  amusementpark_dev_minio_data:
