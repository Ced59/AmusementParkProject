name: Production CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the production VPS after building images
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 24.x
  REGISTRY: ghcr.io

jobs:
  release-version:
    name: Release version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      changed: ${{ steps.version-change.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Read configured frontend release version
        id: release-version
        working-directory: FRONT/AmusementPark
        run: |
          version="$(node scripts/read-release-version.mjs)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Configured frontend release version: ${version}"

      - name: Detect frontend release version change
        id: version-change
        shell: bash
        run: |
          set -euo pipefail
          changed="false"
          version_file="FRONT/AmusementPark/release-version.json"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if ! git diff --quiet "${{ github.event.pull_request.base.sha }}" HEAD -- "${version_file}"; then
              changed="true"
            fi
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "master" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              changed="true"
            elif ! git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- "${version_file}"; then
              changed="true"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            changed="false"
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
          echo "Frontend release version file changed: ${changed}"

      - name: Validate release tag is available
        if: steps.version-change.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release-version.outputs.version }}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tagged_sha="$(git rev-list -n 1 "${tag}")"
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "master" ] && [ "${tagged_sha}" = "${{ github.sha }}" ]; then
              echo "Tag ${tag} already exists locally on this commit."
              exit 0
            fi

            echo "Tag ${tag} already exists locally on ${tagged_sha}."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git fetch --quiet origin "refs/tags/${tag}:refs/tags/${tag}"
            tagged_sha="$(git rev-list -n 1 "${tag}")"
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "master" ] && [ "${tagged_sha}" = "${{ github.sha }}" ]; then
              echo "Tag ${tag} already exists on origin on this commit."
              exit 0
            fi

            echo "Tag ${tag} already exists on origin on ${tagged_sha}."
            exit 1
          fi

      - name: Create release tag on merged master commit
        if: >-
          ${{
            github.event_name == 'push' &&
            github.ref_name == 'master' &&
            steps.version-change.outputs.changed == 'true'
          }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release-version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tagged_sha="$(git rev-list -n 1 "${tag}")"
            if [ "${tagged_sha}" = "${{ github.sha }}" ]; then
              echo "Tag ${tag} already exists on this commit; skipping tag creation."
              exit 0
            fi
          fi

          git tag "${tag}" "${{ github.sha }}"
          git push origin "refs/tags/${tag}"

  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore AmusementPark.sln

      - name: Build backend
        run: dotnet build AmusementPark.sln --configuration Release --no-restore

      - name: Run backend tests when present
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find . -name '*Tests.csproj' -o -name '*Test.csproj')
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No backend test project found yet. Skipping backend tests."
            exit 0
          fi

          for test_project in "${test_projects[@]}"; do
            dotnet test "${test_project}" --configuration Release --no-build --logger trx --results-directory TestResults
          done

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults
          if-no-files-found: ignore

  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-latest
    needs:
      - release-version
    env:
      SITE_VERSION: ${{ needs.release-version.outputs.version }}
    defaults:
      run:
        working-directory: FRONT/AmusementPark
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: FRONT/AmusementPark/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend production SSR
        run: npm run build -- --configuration production

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: FRONT/AmusementPark/coverage
          if-no-files-found: ignore

  dependency-security:
    name: Dependency security reports
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: FRONT/AmusementPark/package-lock.json

      - name: Prepare report directory
        run: mkdir -p dependency-security-reports

      - name: Restore backend for vulnerability scan
        run: dotnet restore AmusementPark.sln

      - name: Scan .NET packages
        shell: bash
        run: |
          set +e
          dotnet list AmusementPark.sln package --vulnerable --include-transitive > dependency-security-reports/dotnet-vulnerable.txt 2>&1
          status=$?
          cat dependency-security-reports/dotnet-vulnerable.txt
          exit 0

      - name: Install frontend dependencies for npm audit
        working-directory: FRONT/AmusementPark
        run: npm ci

      - name: Scan npm packages
        working-directory: FRONT/AmusementPark
        shell: bash
        run: |
          set +e
          npm audit --audit-level=moderate --json > ../../dependency-security-reports/npm-audit.json 2>&1
          npm audit --audit-level=moderate > ../../dependency-security-reports/npm-audit.txt 2>&1
          npm audit signatures > ../../dependency-security-reports/npm-audit-signatures.txt 2>&1
          cat ../../dependency-security-reports/npm-audit.txt
          exit 0

      - name: Upload dependency security reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-reports
          path: dependency-security-reports

  docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - release-version
      - backend
      - frontend
    outputs:
      api_image: ${{ steps.image-names.outputs.api_image }}
      front_image: ${{ steps.image-names.outputs.front_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image names
        id: image-names
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          sha_tag="${GITHUB_SHA}"
          echo "api_image=${REGISTRY}/${owner}/amusementpark-api:${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "front_image=${REGISTRY}/${owner}/amusementpark-front:${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "api_latest=${REGISTRY}/${owner}/amusementpark-api:latest" >> "${GITHUB_OUTPUT}"
          echo "front_latest=${REGISTRY}/${owner}/amusementpark-front:latest" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: API/AmusementPark.WebAPI/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-names.outputs.api_image }}
            ${{ steps.image-names.outputs.api_latest }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push frontend SSR image
        uses: docker/build-push-action@v6
        with:
          context: FRONT/AmusementPark
          file: FRONT/AmusementPark/Dockerfile
          build-args: |
            ANGULAR_CONFIGURATION=production
            GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
            SITE_VERSION=${{ needs.release-version.outputs.version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-names.outputs.front_image }}
            ${{ steps.image-names.outputs.front_latest }}
          cache-from: type=gha,scope=front
          cache-to: type=gha,scope=front,mode=max

  deploy-production:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - docker-images
      - dependency-security
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (github.ref_name == 'main' || github.ref_name == 'master') &&
        (
          (github.event_name == 'push' && vars.PRODUCTION_DEPLOY_ENABLED == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
        )
      }}
    environment: production
    env:
      API_IMAGE: ${{ needs.docker-images.outputs.api_image }}
      FRONT_IMAGE: ${{ needs.docker-images.outputs.front_image }}
      PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN || 'amusement-parks.fun' }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://amusement-parks.fun' }}
      PUBLIC_WWW_BASE_URL: ${{ vars.PUBLIC_WWW_BASE_URL || 'https://www.amusement-parks.fun' }}
      PUBLIC_HTTP_PORT: ${{ vars.PUBLIC_HTTP_PORT || '18080' }}
      NPM_DOCKER_NETWORK_NAME: ${{ vars.NPM_DOCKER_NETWORK_NAME || 'nginx-proxy-network' }}
      BACKEND_PRIVATE_SUBNET: ${{ vars.BACKEND_PRIVATE_SUBNET || '172.30.31.0/24' }}
      ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS || 'amusement-parks.fun;www.amusement-parks.fun;localhost;127.0.0.1;api;amusementpark-api' }}
      FORWARDED_HEADERS_ALLOWED_HOSTS: ${{ vars.FORWARDED_HEADERS_ALLOWED_HOSTS || 'amusement-parks.fun;www.amusement-parks.fun;localhost;127.0.0.1' }}
      FORWARDED_HEADERS_KNOWN_NETWORKS: ${{ vars.FORWARDED_HEADERS_KNOWN_NETWORKS || '172.30.31.0/24' }}
      FRONT_SSR_API_INTERNAL_URL: ${{ vars.FRONT_SSR_API_INTERNAL_URL || 'http://api:8080' }}
      SSR_ALLOWED_HOSTS: ${{ vars.SSR_ALLOWED_HOSTS || 'amusement-parks.fun;www.amusement-parks.fun;localhost;127.0.0.1' }}
      SSR_FORCE_HTTPS: ${{ vars.SSR_FORCE_HTTPS || 'true' }}
      CSP_ENABLED: ${{ vars.CSP_ENABLED || 'true' }}
      CSP_REPORT_ONLY: ${{ vars.CSP_REPORT_ONLY || 'true' }}
      SEO_MAX_DYNAMIC_URLS_PER_TYPE: ${{ vars.SEO_MAX_DYNAMIC_URLS_PER_TYPE || '50' }}
      MONGO_DATABASE_NAME: ${{ vars.PROD_MONGO_DATABASE_NAME || 'AmusementPark' }}
      MONGO_INITDB_ROOT_USERNAME: ${{ secrets.PROD_MONGO_ROOT_USERNAME }}
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.PROD_MONGO_ROOT_PASSWORD }}
      MONGO_APP_USERNAME: ${{ secrets.PROD_MONGO_APP_USERNAME }}
      MONGO_APP_PASSWORD: ${{ secrets.PROD_MONGO_APP_PASSWORD }}
      MINIO_IMAGE: ${{ vars.MINIO_IMAGE || 'quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z' }}
      MINIO_ROOT_USER: ${{ secrets.PROD_MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.PROD_MINIO_ROOT_PASSWORD }}
      MINIO_BUCKET: ${{ vars.PROD_MINIO_BUCKET || 'amusement-park-images' }}
      MINIO_API_PORT: ${{ vars.MINIO_API_PORT || '19000' }}
      MINIO_CONSOLE_PORT: ${{ vars.MINIO_CONSOLE_PORT || '19001' }}
      JWT_KEY: ${{ secrets.PROD_JWT_KEY }}
      JWT_ISSUER: ${{ vars.PROD_JWT_ISSUER || 'AmusementPark' }}
      JWT_AUDIENCE: ${{ vars.PROD_JWT_AUDIENCE || 'AmusementPark' }}
      GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ vars.PROD_GOOGLE_REDIRECT_URI || 'https://amusement-parks.fun/api/auth/external/google/callback' }}
      FACEBOOK_APP_ID: ${{ secrets.PROD_FACEBOOK_APP_ID }}
      FACEBOOK_APP_SECRET: ${{ secrets.PROD_FACEBOOK_APP_SECRET }}
      EMAIL_MODE: ${{ vars.PROD_EMAIL_MODE || 'Console' }}
      EMAIL_HOST: ${{ secrets.PROD_EMAIL_HOST }}
      EMAIL_PORT: ${{ vars.PROD_EMAIL_PORT || '587' }}
      EMAIL_USE_SSL: ${{ vars.PROD_EMAIL_USE_SSL || 'false' }}
      EMAIL_USE_STARTTLS: ${{ vars.PROD_EMAIL_USE_STARTTLS || 'true' }}
      EMAIL_USERNAME: ${{ secrets.PROD_EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.PROD_EMAIL_PASSWORD }}
      EMAIL_FROM_ADDRESS: ${{ vars.PROD_EMAIL_FROM_ADDRESS || 'noreply@amusement-parks.fun' }}
      EMAIL_FROM_NAME: ${{ vars.PROD_EMAIL_FROM_NAME || 'Amusement Park' }}
      ADMIN_USER_ENABLED: ${{ vars.PROD_ADMIN_USER_ENABLED || 'false' }}
      ADMIN_USER_EMAIL: ${{ secrets.PROD_ADMIN_USER_EMAIL }}
      ADMIN_USER_PASSWORD: ${{ secrets.PROD_ADMIN_USER_PASSWORD }}
      BACKUP_BEFORE_DEPLOY: ${{ vars.BACKUP_BEFORE_DEPLOY || 'true' }}
      RUN_LEGACY_ENUM_MIGRATIONS: ${{ vars.RUN_LEGACY_ENUM_MIGRATIONS || 'true' }}
      LEGACY_ENUM_MIGRATIONS_DRY_RUN: ${{ vars.LEGACY_ENUM_MIGRATIONS_DRY_RUN || 'false' }}
      SSR_SEO_DOCUMENT_CACHE_SECONDS: ${{ vars.SSR_SEO_DOCUMENT_CACHE_SECONDS || '0' }}
      SSR_SEO_DOCUMENT_CACHE_MAX_ENTRIES: ${{ vars.SSR_SEO_DOCUMENT_CACHE_MAX_ENTRIES || '128' }}
      SSR_SEO_DOCUMENT_BROWSER_CACHE_CONTROL: ${{ vars.SSR_SEO_DOCUMENT_BROWSER_CACHE_CONTROL || 'no-cache, max-age=0, must-revalidate' }}
      SSR_CACHE_INVALIDATION_TOKEN: ${{ secrets.SSR_CACHE_INVALIDATION_TOKEN || secrets.PROD_SSR_CACHE_INVALIDATION_TOKEN }}
      SSR_RENDER_ENABLED: ${{ vars.SSR_RENDER_ENABLED || 'true' }}
      SSR_RENDER_ON_CACHE_MISS: ${{ vars.SSR_RENDER_ON_CACHE_MISS || 'false' }}
      SSR_RENDER_CRITICAL_ROUTES_ON_CACHE_MISS: ${{ vars.SSR_RENDER_CRITICAL_ROUTES_ON_CACHE_MISS || 'true' }}
      SSR_PAGE_CACHE_SECONDS: ${{ vars.SSR_PAGE_CACHE_SECONDS || '86400' }}
      SSR_PAGE_CACHE_MAX_ENTRIES: ${{ vars.SSR_PAGE_CACHE_MAX_ENTRIES || '2000' }}
      SSR_PAGE_CACHE_BROWSER_CACHE_CONTROL: ${{ vars.SSR_PAGE_CACHE_BROWSER_CACHE_CONTROL || 'no-cache, max-age=0, must-revalidate' }}
      SSR_PAGE_CACHE_MAX_HTML_BYTES: ${{ vars.SSR_PAGE_CACHE_MAX_HTML_BYTES || '2097152' }}
      SSR_RENDER_MAX_CONCURRENCY: ${{ vars.SSR_RENDER_MAX_CONCURRENCY || '1' }}
      SSR_RENDER_QUEUE_MAX_ENTRIES: ${{ vars.SSR_RENDER_QUEUE_MAX_ENTRIES || '8' }}
      SSR_RENDER_QUEUE_WARNING_THRESHOLD: ${{ vars.SSR_RENDER_QUEUE_WARNING_THRESHOLD || '6' }}
      SSR_SLOW_RENDER_THRESHOLD_MILLISECONDS: ${{ vars.SSR_SLOW_RENDER_THRESHOLD_MILLISECONDS || '3000' }}
      SSR_PUBLIC_PAGE_CACHE_ALLOW_AUTH_COOKIES: ${{ vars.SSR_PUBLIC_PAGE_CACHE_ALLOW_AUTH_COOKIES || 'true' }}
      SSR_DISK_PAGE_CACHE_ENABLED: ${{ vars.SSR_DISK_PAGE_CACHE_ENABLED || 'true' }}
      SSR_DISK_PAGE_CACHE_DIR: ${{ vars.SSR_DISK_PAGE_CACHE_DIR || '/var/cache/amusementpark-ssr' }}
      SSR_DISK_PAGE_CACHE_MAX_BYTES: ${{ vars.SSR_DISK_PAGE_CACHE_MAX_BYTES || '4294967296' }}
      SSR_DISK_PAGE_CACHE_BUDGET_CHECK_EVERY_WRITES: ${{ vars.SSR_DISK_PAGE_CACHE_BUDGET_CHECK_EVERY_WRITES || '100' }}
      SSR_ASSET_MISS_LOG_SAMPLE_RATE: ${{ vars.SSR_ASSET_MISS_LOG_SAMPLE_RATE || '25' }}
      SSR_CSR_FALLBACK_LOG_SAMPLE_RATE: ${{ vars.SSR_CSR_FALLBACK_LOG_SAMPLE_RATE || '100' }}
      SSR_CSR_FALLBACK_CACHE_CONTROL: ${{ vars.SSR_CSR_FALLBACK_CACHE_CONTROL || 'public, max-age=60, stale-while-revalidate=300' }}
      SSR_WARMUP_AFTER_DEPLOY: ${{ vars.SSR_WARMUP_AFTER_DEPLOY || 'false' }}
      SSR_WARMUP_BACKGROUND: ${{ vars.SSR_WARMUP_BACKGROUND || 'true' }}
      SSR_WARMUP_REQUIRED: ${{ vars.SSR_WARMUP_REQUIRED || 'false' }}
      SSR_WARMUP_PROFILE: ${{ vars.SSR_WARMUP_PROFILE || 'critical' }}
      SSR_WARMUP_CONCURRENCY: ${{ vars.SSR_WARMUP_CONCURRENCY || '1' }}
      SSR_WARMUP_TIMEOUT_SECONDS: ${{ vars.SSR_WARMUP_TIMEOUT_SECONDS || '90' }}
      SSR_WARMUP_SLEEP_SECONDS: ${{ vars.SSR_WARMUP_SLEEP_SECONDS || '0' }}
      SSR_WARMUP_MAX_URLS: ${{ vars.SSR_WARMUP_MAX_URLS || '0' }}
      SSR_WARMUP_REFRESH: ${{ vars.SSR_WARMUP_REFRESH || 'false' }}
      SSR_WARMUP_LANGS: ${{ vars.SSR_WARMUP_LANGS }}
      SSR_WARMUP_URL_FILTER_REGEX: ${{ vars.SSR_WARMUP_URL_FILTER_REGEX }}
      SSR_WARMUP_SITEMAP_FILTER_REGEX: ${{ vars.SSR_WARMUP_SITEMAP_FILTER_REGEX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm deployment context
        run: |
          echo "Deployment authorized for event=${{ github.event_name }} ref=${{ github.ref_name }}"

      - name: Generate production .env
        run: |
          chmod +x deploy/scripts/write-production-env.sh deploy/scripts/validate-production-env.sh deploy/scripts/env-loader.sh
          deploy/scripts/write-production-env.sh deploy/.env
          deploy/scripts/validate-production-env.sh deploy/.env

      - name: Prepare deployment bundle
        run: |
          tar -czf amusementpark-deploy.tgz \
            -C deploy \
            compose.prod.yml \
            mongo-init.js \
            .env \
            scripts

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/amusementpark_deploy_key
          chmod 600 ~/.ssh/amusementpark_deploy_key
          ssh-keyscan -p "${VPS_SSH_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/amusementpark' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amusementpark_deploy_key -p "${VPS_SSH_PORT}" "${VPS_SSH_USER}@${VPS_HOST}" "mkdir -p '${VPS_DEPLOY_PATH}'"
          scp -i ~/.ssh/amusementpark_deploy_key -P "${VPS_SSH_PORT}" amusementpark-deploy.tgz "${VPS_SSH_USER}@${VPS_HOST}:/tmp/amusementpark-deploy.tgz"
          ssh -i ~/.ssh/amusementpark_deploy_key -p "${VPS_SSH_PORT}" "${VPS_SSH_USER}@${VPS_HOST}" "tar -xzf /tmp/amusementpark-deploy.tgz -C '${VPS_DEPLOY_PATH}' && rm /tmp/amusementpark-deploy.tgz && chmod +x '${VPS_DEPLOY_PATH}'/scripts/*.sh"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/amusementpark' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amusementpark_deploy_key -p "${VPS_SSH_PORT}" "${VPS_SSH_USER}@${VPS_HOST}" \
            "export GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}'; \
             if [ -n \"\${GHCR_USERNAME}\" ] && [ -n \"\${GHCR_TOKEN}\" ]; then echo \"\${GHCR_TOKEN}\" | docker login ghcr.io -u \"\${GHCR_USERNAME}\" --password-stdin; fi; \
             cd '${VPS_DEPLOY_PATH}' && ./scripts/deploy.sh"
