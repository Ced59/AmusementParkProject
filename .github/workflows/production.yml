name: Production CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the production VPS after building images
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 24.x
  REGISTRY: ghcr.io

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore AmusementPark.sln

      - name: Build backend
        run: dotnet build AmusementPark.sln --configuration Release --no-restore

      - name: Run backend tests when present
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find . -name '*Tests.csproj' -o -name '*Test.csproj')
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No backend test project found yet. Skipping backend tests."
            exit 0
          fi

          for test_project in "${test_projects[@]}"; do
            dotnet test "${test_project}" --configuration Release --no-build --logger trx --results-directory TestResults
          done

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults
          if-no-files-found: ignore

  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FRONT/AmusementPark
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: FRONT/AmusementPark/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend production SSR
        run: npm run build -- --configuration production

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: FRONT/AmusementPark/coverage
          if-no-files-found: ignore

  dependency-security:
    name: Dependency security reports
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: FRONT/AmusementPark/package-lock.json

      - name: Prepare report directory
        run: mkdir -p dependency-security-reports

      - name: Restore backend for vulnerability scan
        run: dotnet restore AmusementPark.sln

      - name: Scan .NET packages
        shell: bash
        run: |
          set +e
          dotnet list AmusementPark.sln package --vulnerable --include-transitive > dependency-security-reports/dotnet-vulnerable.txt 2>&1
          status=$?
          cat dependency-security-reports/dotnet-vulnerable.txt
          exit 0

      - name: Install frontend dependencies for npm audit
        working-directory: FRONT/AmusementPark
        run: npm ci

      - name: Scan npm packages
        working-directory: FRONT/AmusementPark
        shell: bash
        run: |
          set +e
          npm audit --audit-level=moderate --json > ../../dependency-security-reports/npm-audit.json 2>&1
          npm audit --audit-level=moderate > ../../dependency-security-reports/npm-audit.txt 2>&1
          npm audit signatures > ../../dependency-security-reports/npm-audit-signatures.txt 2>&1
          cat ../../dependency-security-reports/npm-audit.txt
          exit 0

      - name: Upload dependency security reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-reports
          path: dependency-security-reports

  docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    outputs:
      api_image: ${{ steps.image-names.outputs.api_image }}
      front_image: ${{ steps.image-names.outputs.front_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: image-names
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          sha_tag="${GITHUB_SHA}"
          echo "api_image=${REGISTRY}/${owner}/amusementpark-api:${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "front_image=${REGISTRY}/${owner}/amusementpark-front:${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "api_latest=${REGISTRY}/${owner}/amusementpark-api:latest" >> "${GITHUB_OUTPUT}"
          echo "front_latest=${REGISTRY}/${owner}/amusementpark-front:latest" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: API/AmusementPark.WebAPI/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-names.outputs.api_image }}
            ${{ steps.image-names.outputs.api_latest }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push frontend SSR image
        uses: docker/build-push-action@v6
        with:
          context: FRONT/AmusementPark
          file: FRONT/AmusementPark/Dockerfile
          build-args: |
            ANGULAR_CONFIGURATION=production
            GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-names.outputs.front_image }}
            ${{ steps.image-names.outputs.front_latest }}
          cache-from: type=gha,scope=front
          cache-to: type=gha,scope=front,mode=max

  deploy-production:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - docker-images
      - dependency-security
    if: >-
      ${{
        github.event_name != 'pull_request' &&
        (github.ref_name == 'main' || github.ref_name == 'master') &&
        (
          (github.event_name == 'push' && vars.PRODUCTION_DEPLOY_ENABLED == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
        )
      }}
    environment: production
    env:
      API_IMAGE: ${{ needs.docker-images.outputs.api_image }}
      FRONT_IMAGE: ${{ needs.docker-images.outputs.front_image }}
      PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN || 'amusement-parks.fun' }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://amusement-parks.fun' }}
      PUBLIC_WWW_BASE_URL: ${{ vars.PUBLIC_WWW_BASE_URL || 'https://www.amusement-parks.fun' }}
      PUBLIC_HTTP_PORT: ${{ vars.PUBLIC_HTTP_PORT || '18080' }}
      NPM_DOCKER_NETWORK_NAME: ${{ vars.NPM_DOCKER_NETWORK_NAME || 'nginx-proxy-network' }}
      BACKEND_PRIVATE_SUBNET: ${{ vars.BACKEND_PRIVATE_SUBNET || '172.30.31.0/24' }}
      ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS || 'amusement-parks.fun;www.amusement-parks.fun;localhost;127.0.0.1;amusementpark-api' }}
      FORWARDED_HEADERS_ALLOWED_HOSTS: ${{ vars.FORWARDED_HEADERS_ALLOWED_HOSTS || 'amusement-parks.fun;www.amusement-parks.fun;localhost;127.0.0.1' }}
      FORWARDED_HEADERS_KNOWN_NETWORKS: ${{ vars.FORWARDED_HEADERS_KNOWN_NETWORKS || '172.30.31.0/24' }}
      SSR_ALLOWED_HOSTS: ${{ vars.SSR_ALLOWED_HOSTS || 'amusement-parks.fun;www.amusement-parks.fun;localhost;127.0.0.1' }}
      SSR_FORCE_HTTPS: ${{ vars.SSR_FORCE_HTTPS || 'true' }}
      CSP_ENABLED: ${{ vars.CSP_ENABLED || 'true' }}
      CSP_REPORT_ONLY: ${{ vars.CSP_REPORT_ONLY || 'true' }}
      SEO_MAX_DYNAMIC_URLS_PER_TYPE: ${{ vars.SEO_MAX_DYNAMIC_URLS_PER_TYPE || '50' }}
      MONGO_DATABASE_NAME: ${{ vars.PROD_MONGO_DATABASE_NAME || 'AmusementPark' }}
      MONGO_INITDB_ROOT_USERNAME: ${{ secrets.PROD_MONGO_ROOT_USERNAME }}
      MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.PROD_MONGO_ROOT_PASSWORD }}
      MONGO_APP_USERNAME: ${{ secrets.PROD_MONGO_APP_USERNAME }}
      MONGO_APP_PASSWORD: ${{ secrets.PROD_MONGO_APP_PASSWORD }}
      MINIO_IMAGE: ${{ vars.MINIO_IMAGE || 'quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z' }}
      MINIO_ROOT_USER: ${{ secrets.PROD_MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.PROD_MINIO_ROOT_PASSWORD }}
      MINIO_BUCKET: ${{ vars.PROD_MINIO_BUCKET || 'amusement-park-images' }}
      MINIO_API_PORT: ${{ vars.MINIO_API_PORT || '19000' }}
      MINIO_CONSOLE_PORT: ${{ vars.MINIO_CONSOLE_PORT || '19001' }}
      JWT_KEY: ${{ secrets.PROD_JWT_KEY }}
      JWT_ISSUER: ${{ vars.PROD_JWT_ISSUER || 'AmusementPark' }}
      JWT_AUDIENCE: ${{ vars.PROD_JWT_AUDIENCE || 'AmusementPark' }}
      GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ vars.PROD_GOOGLE_REDIRECT_URI || 'https://amusement-parks.fun/api/auth/external/google/callback' }}
      FACEBOOK_APP_ID: ${{ secrets.PROD_FACEBOOK_APP_ID }}
      FACEBOOK_APP_SECRET: ${{ secrets.PROD_FACEBOOK_APP_SECRET }}
      EMAIL_MODE: ${{ vars.PROD_EMAIL_MODE || 'Console' }}
      EMAIL_HOST: ${{ secrets.PROD_EMAIL_HOST }}
      EMAIL_PORT: ${{ vars.PROD_EMAIL_PORT || '587' }}
      EMAIL_USE_SSL: ${{ vars.PROD_EMAIL_USE_SSL || 'false' }}
      EMAIL_USE_STARTTLS: ${{ vars.PROD_EMAIL_USE_STARTTLS || 'true' }}
      EMAIL_USERNAME: ${{ secrets.PROD_EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.PROD_EMAIL_PASSWORD }}
      EMAIL_FROM_ADDRESS: ${{ vars.PROD_EMAIL_FROM_ADDRESS || 'noreply@amusement-parks.fun' }}
      EMAIL_FROM_NAME: ${{ vars.PROD_EMAIL_FROM_NAME || 'Amusement Park' }}
      ADMIN_USER_ENABLED: ${{ vars.PROD_ADMIN_USER_ENABLED || 'false' }}
      ADMIN_USER_EMAIL: ${{ secrets.PROD_ADMIN_USER_EMAIL }}
      ADMIN_USER_PASSWORD: ${{ secrets.PROD_ADMIN_USER_PASSWORD }}
      BACKUP_BEFORE_DEPLOY: ${{ vars.BACKUP_BEFORE_DEPLOY || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm deployment context
        run: |
          echo "Deployment authorized for event=${{ github.event_name }} ref=${{ github.ref_name }}"

      - name: Generate production .env
        run: |
          chmod +x deploy/scripts/write-production-env.sh deploy/scripts/validate-production-env.sh deploy/scripts/env-loader.sh
          deploy/scripts/write-production-env.sh deploy/.env
          deploy/scripts/validate-production-env.sh deploy/.env

      - name: Prepare deployment bundle
        run: |
          tar -czf amusementpark-deploy.tgz \
            -C deploy \
            compose.prod.yml \
            mongo-init.js \
            .env \
            scripts

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/amusementpark_deploy_key
          chmod 600 ~/.ssh/amusementpark_deploy_key
          ssh-keyscan -p "${VPS_SSH_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/amusementpark' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amusementpark_deploy_key -p "${VPS_SSH_PORT}" "${VPS_SSH_USER}@${VPS_HOST}" "mkdir -p '${VPS_DEPLOY_PATH}'"
          scp -i ~/.ssh/amusementpark_deploy_key -P "${VPS_SSH_PORT}" amusementpark-deploy.tgz "${VPS_SSH_USER}@${VPS_HOST}:/tmp/amusementpark-deploy.tgz"
          ssh -i ~/.ssh/amusementpark_deploy_key -p "${VPS_SSH_PORT}" "${VPS_SSH_USER}@${VPS_HOST}" "tar -xzf /tmp/amusementpark-deploy.tgz -C '${VPS_DEPLOY_PATH}' && rm /tmp/amusementpark-deploy.tgz && chmod +x '${VPS_DEPLOY_PATH}'/scripts/*.sh"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/amusementpark' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/amusementpark_deploy_key -p "${VPS_SSH_PORT}" "${VPS_SSH_USER}@${VPS_HOST}" \
            "export GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}'; \
             if [ -n \"\${GHCR_USERNAME}\" ] && [ -n \"\${GHCR_TOKEN}\" ]; then echo \"\${GHCR_TOKEN}\" | docker login ghcr.io -u \"\${GHCR_USERNAME}\" --password-stdin; fi; \
             cd '${VPS_DEPLOY_PATH}' && ./scripts/deploy.sh"
