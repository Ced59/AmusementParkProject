name: Create release tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create on master, for example v0.3.0
        type: string
        required: true

permissions:
  contents: write

jobs:
  create-release-tag:
    name: Create release tag on master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Validate requested tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"

          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([._-][0-9A-Za-z]+)*$ ]]; then
            echo "Tag must look like v0.3.0 or v0.3.0-rc1."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin."
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "refs/tags/${tag}"
