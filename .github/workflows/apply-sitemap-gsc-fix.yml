name: Apply sitemap GSC fix

on:
  push:
    branches:
      - fix/sitemap-gsc-seo-proxy-headers

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sitemap-gsc-seo-proxy-headers
          fetch-depth: 0

      - name: Apply targeted sitemap GSC fix
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path

          server_path = Path('FRONT/AmusementPark/server.ts')
          text = server_path.read_text(encoding='utf-8')

          old_fetch_headers = """  const headers = buildApiProxyHeaders(req, targetUrl);\n  delete headers['accept-encoding'];"""
          new_fetch_headers = """  const headers = buildSeoDocumentFetchHeaders(req, targetUrl);"""
          if old_fetch_headers in text:
              text = text.replace(old_fetch_headers, new_fetch_headers, 1)
          elif new_fetch_headers not in text:
              raise SystemExit('Expected fetchSeoDocumentFromApi header block was not found.')

          old_cached_headers = """    responseHeaders[name] = value;
          });

          responseHeaders['content-length'] = bodyLength.toString();

          if (!responseHeaders['cache-control']) {
            const browserMaxAge = Math.min(seoDocumentCacheTtlSeconds, 300);
            responseHeaders['cache-control'] = `public, max-age=${browserMaxAge}, stale-while-revalidate=60`;
          }

          return responseHeaders;
        }"""
          new_cached_headers = """    const normalizedName = name.toLowerCase();
            if (normalizedName === 'cache-control' || normalizedName === 'vary') {
              return;
            }

            responseHeaders[name] = value;
          });

          responseHeaders['content-length'] = bodyLength.toString();

          const browserMaxAge = Math.min(seoDocumentCacheTtlSeconds, 300);
          responseHeaders['cache-control'] = `public, max-age=${browserMaxAge}, stale-while-revalidate=60`;

          return responseHeaders;
        }"""
          if old_cached_headers in text:
              text = text.replace(old_cached_headers, new_cached_headers, 1)
          elif "normalizedName === 'cache-control' || normalizedName === 'vary'" not in text:
              raise SystemExit('Expected buildCachedSeoDocumentHeaders block was not found.')

          helper = """
        /**
         * Construit les headers minimalistes pour le fetch interne d'un document SEO vers l'API.
         *
         * Contrairement à buildApiProxyHeaders qui transmet les headers de la requête entrante,
         * cette fonction produit un jeu de headers propre et déterministe :
         * - Pas de Cookie ni Authorization (garantit que le OutputCache API met en cache la réponse).
         * - Pas d'User-Agent du crawler entrant (évite toute logique basée sur l'UA côté API).
         * - Pas d'Accept-Encoding (le corps doit rester non compressé pour être mis en cache en mémoire).
         * - Accept: application/xml, text/plain pour guider la négociation de contenu.
         *
         * Les headers de forwarding (Host, X-Forwarded-*) sont conservés pour que l'API
         * construise correctement les URLs publiques (sitemap index, robots Sitemap:).
         */
        function buildSeoDocumentFetchHeaders(req: Request, targetUrl: URL): http.OutgoingHttpHeaders {
          const publicProtocol = getForwardedValue(req, 'x-forwarded-proto') ?? req.protocol;
          const publicHost = getForwardedValue(req, 'x-forwarded-host') ?? req.headers.host ?? targetUrl.host;

          const headers: http.OutgoingHttpHeaders = {
            'host': publicHost,
            'x-forwarded-host': publicHost,
            'x-forwarded-proto': publicProtocol,
            'x-forwarded-for': appendForwardedFor(req),
            'accept': 'application/xml, text/plain, */*',
            'accept-language': 'en',
            'user-agent': 'AmusementPark-SSR-SeoCache/1.0',
          };

          return headers;
        }
        """
          marker = "\nfunction isApiHeaderHiddenFromPublicProxy(name: string): boolean {"
          if 'function buildSeoDocumentFetchHeaders' not in text:
              if marker not in text:
                  raise SystemExit('Expected insertion marker was not found.')
              text = text.replace(marker, helper + marker, 1)

          server_path.write_text(text, encoding='utf-8')

          doc_path = Path('docs/performance/sitemap-google-search-console-fix-2026-06-08.md')
          doc_path.parent.mkdir(parents=True, exist_ok=True)
          doc_path.write_text("""# Fix : Google Search Console — Impossible de récupérer le sitemap

## Date

2026-06-08

## Symptôme

Google Search Console signale encore `Impossible de récupérer le sitemap` pour `https://amusement-parks.fun/sitemap.xml` alors que les tests `curl` externes retournent `200 OK`.

## Diagnostic

Le cache front SSR des documents SEO fonctionne, mais un premier hit froid peut encore interroger l'API avec des headers hérités du caller si le fetch interne SEO réutilise la fonction générique de proxy.

Deux durcissements sont appliqués :

1. Le fetch interne SSR → API des documents SEO utilise maintenant des headers minimalistes et déterministes.
2. Les headers publics servis aux crawlers ne propagent plus `Vary` ni `Cache-Control` issus de l'API. Le SSR impose un `Cache-Control` public propre.

## Correction

Dans `FRONT/AmusementPark/server.ts` :

- `fetchSeoDocumentFromApi()` utilise `buildSeoDocumentFetchHeaders()`.
- `buildSeoDocumentFetchHeaders()` ne transmet pas `Cookie`, `Authorization`, ni le `User-Agent` du crawler entrant.
- `buildCachedSeoDocumentHeaders()` exclut `cache-control` et `vary` provenant de l'API.
- le cache public exposé reste : `public, max-age=<min(ttl,300)>, stale-while-revalidate=60`.

## Objectif

Rendre `/sitemap.xml`, `/sitemaps/*` et `/robots.txt` plus stables pour Google Search Console, y compris lors d'un cache froid, sans changer la structure des sitemaps ni la génération admin par snapshot.
""", encoding='utf-8')

          workflow_path = Path('.github/workflows/apply-sitemap-gsc-fix.yml')
          workflow_path.unlink(missing_ok=True)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FRONT/AmusementPark/server.ts docs/performance/sitemap-google-search-console-fix-2026-06-08.md .github/workflows/apply-sitemap-gsc-fix.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "fix: harden SEO document proxy headers for GSC"
          git push origin HEAD:fix/sitemap-gsc-seo-proxy-headers
